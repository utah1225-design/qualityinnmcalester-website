<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet"> 
<title>Incident Log — Quality Inn & Suites McAlester</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="shortcut icon" href="assets/favicon.ico">
<style>
:root{
  --bg:#f4f5f7;
  --paper:#fafbfc;
  --paper-card:#ffffff;
  --ink:#1a1d24;
  --ink-soft:#5a6273;
  --ink-mute:#8d94a3;
  --line:#e3e6ec;
  --accent:#2c5f8d;
  --accent-soft:#e8f0f7;
  --good:#1d9b6c;
  --good-soft:#e3f5ec;
  --warn:#c97a1a;
  --warn-soft:#fdf1e1;
  --alert:#c4493e;
  --alert-soft:#fce8e6;
  --topbar:#1a1d24;
  --shadow:0 1px 2px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5}

.il-topbar{background:var(--topbar);color:#fff;padding:10px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #000}
.il-title{font-size:14px;font-weight:600}
.il-sub{font-size:11px;color:rgba(255,255,255,0.5)}
.il-agent{margin-left:auto;font-size:12px;color:rgba(255,255,255,0.65);display:flex;align-items:center;gap:10px}
.il-refresh{background:none;border:none;color:rgba(255,255,255,0.85);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:4px}
.il-refresh:hover{background:rgba(255,255,255,0.1)}
.il-refresh:disabled{opacity:0.4;cursor:wait}
.il-updated{color:rgba(255,255,255,0.5);font-size:10px;margin-left:6px}

.il-main{padding:18px 22px;max-width:1100px;margin:0 auto}
.il-h1{font-size:18px;font-weight:600;margin:0 0 4px}
.il-desc{font-size:13px;color:var(--ink-soft);margin-bottom:18px}

.il-top-actions{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.il-add-btn{padding:10px 18px;background:var(--alert);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.il-add-btn:hover{background:#a93a31}

.il-chips{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.il-chip{background:var(--paper-card);border:1px solid var(--line);border-radius:18px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.il-chip:hover{border-color:var(--accent);color:var(--accent)}
.il-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.il-chip-count{background:rgba(0,0,0,0.08);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600}
.il-chip.active .il-chip-count{background:rgba(255,255,255,0.22);color:#fff}

.il-list{display:flex;flex-direction:column;gap:10px}
.il-card{background:var(--paper-card);border:1px solid var(--line);border-radius:8px;padding:14px 16px;box-shadow:var(--shadow)}
.il-card-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.il-card-id{font-size:10px;color:var(--ink-mute);font-family:Menlo,Consolas,monospace;background:var(--paper);padding:2px 7px;border-radius:3px}
.il-category{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.il-cat-safety{background:var(--alert-soft);color:var(--alert)}
.il-cat-security{background:#fdebd1;color:#9b5a0a}
.il-cat-noise{background:#f3eafa;color:#7344b0}
.il-cat-police{background:#e8f0f7;color:#234e76}
.il-cat-fire{background:var(--alert-soft);color:var(--alert)}
.il-cat-vendor{background:var(--accent-soft);color:var(--accent)}
.il-cat-other{background:#eaecf0;color:var(--ink-soft)}
.il-status-badge{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.il-status-open{background:var(--warn-soft);color:var(--warn)}
.il-status-resolved{background:var(--good-soft);color:var(--good)}
.il-status-archived{background:#eaecf0;color:var(--ink-soft)}
.il-time-block{display:flex;flex-direction:column;align-items:flex-end;gap:1px;margin-left:auto;font-size:11px;line-height:1.35}
.il-time-rel{color:var(--ink-mute);font-weight:500}
.il-time-abs{color:var(--ink-mute);font-size:10px;opacity:0.85}
.il-card-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px}
.il-card-body{padding:10px 12px;background:var(--paper);border-radius:5px;border-left:3px solid var(--line);margin:6px 0 10px}
.il-row{margin-bottom:4px;font-size:13px}
.il-row:last-child{margin-bottom:0}
.il-label{font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-mute);margin-right:6px}
.il-card-meta{font-size:11px;color:var(--ink-mute);margin:8px 0 0;display:flex;flex-wrap:wrap;gap:10px}
.il-card-notes{margin-top:8px;padding:8px 12px;background:#f8f9fb;border-radius:5px;border-left:3px solid var(--good)}
.il-note{font-size:12px;color:var(--ink);line-height:1.5}
.il-note-meta{font-size:10px;color:var(--ink-mute);margin-top:3px}
.il-card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.il-btn{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;font-family:inherit}
.il-btn-resolve{background:var(--good);color:#fff;border-color:var(--good)}
.il-btn-resolve:hover{background:#168558}
.il-btn-archive{background:var(--paper);color:var(--ink-soft);border-color:var(--line)}
.il-btn-archive:hover{background:#eef0f4}
.il-btn-restore{background:var(--accent);color:#fff;border-color:var(--accent)}
.il-btn-restore:hover{background:#234e76}
.il-report-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);text-decoration:none;font-weight:600;padding:6px 11px;border:1px solid var(--accent);border-radius:5px;background:#fff}
.il-report-link:hover{background:var(--accent-soft)}
.il-report-link svg{width:13px;height:13px}

.il-card.is-resolved{opacity:0.85;border-style:dashed}
.il-card.is-archived{opacity:0.65;border-style:dashed;background:var(--paper)}

.il-empty{text-align:center;padding:40px 20px;color:var(--ink-mute);font-size:13px}
.il-empty-icon{font-size:30px;margin-bottom:10px;opacity:0.4}

/* MODAL */
.il-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:18px}
.il-modal{background:#fff;border-radius:10px;padding:26px 24px;width:100%;max-width:560px;box-shadow:0 20px 50px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto}
.il-modal h3{margin:0 0 6px;font-size:17px}
.il-modal p{margin:0 0 14px;color:var(--ink-soft);font-size:13px}
.il-modal-field{margin-bottom:12px}
.il-modal-field label{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase}
.il-modal-input,.il-modal-textarea,.il-modal-select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:inherit;outline:none;background:var(--paper)}
.il-modal-input:focus,.il-modal-textarea:focus,.il-modal-select:focus{border-color:var(--accent);background:#fff}
.il-modal-textarea{resize:vertical;min-height:80px}
.il-modal-row{display:flex;gap:10px}
.il-modal-row .il-modal-field{flex:1}
.il-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.il-modal-btn-cancel{padding:9px 18px;background:#fff;color:var(--ink-soft);border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:13px;cursor:pointer}
.il-modal-btn-confirm{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.il-modal-btn-confirm:hover{background:#234e76}
.il-modal-btn-confirm:disabled{opacity:0.6;cursor:wait}

.il-signin-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1100;padding:18px}
.il-signin{background:#fff;border-radius:10px;padding:26px 24px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,0.3)}
.il-signin h3{margin:0 0 6px;font-size:17px}
.il-signin p{margin:0 0 14px;color:var(--ink-soft);font-size:13px}
.il-signin-select,.il-signin-input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;background:var(--paper-card)}
.il-signin-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

@media (max-width:640px){
  .il-main{padding:14px}
  .il-time-block{font-size:10px}
  .il-modal-row{flex-direction:column;gap:0}
}
</style>
</head>
<body>

<div class="il-topbar">
  <div>
    <div class="il-title">Incident Log</div>
    <div class="il-sub">Quality Inn &amp; Suites McAlester</div>
  </div>
  <div class="il-agent">
    <span id="agentTag"></span>
    <button class="il-refresh" id="refreshBtn" title="Refresh">&#8635;</button>
    <span class="il-updated" id="updatedLabel"></span>
  </div>
</div>

<div class="il-main">
  <h1 class="il-h1">Incident Log</h1>
  <div class="il-desc">Non-charge incidents — guest disputes, safety events, police visits, vendor visits, alarm tests. For liability and audit.</div>

  <div class="il-top-actions">
    <button class="il-add-btn" id="addBtn">+ Log Incident</button>
  </div>

  <div class="il-chips" id="chips"></div>
  <div class="il-list" id="list"></div>
</div>

<script>
var WORKER_URL = "https://qi-concierge.utah1225.workers.dev";

var CATEGORIES = [
  { key:"Safety",   label:"Safety",         cssClass:"il-cat-safety" },
  { key:"Security", label:"Security",       cssClass:"il-cat-security" },
  { key:"Noise",    label:"Noise complaint",cssClass:"il-cat-noise" },
  { key:"Police",   label:"Police visit",   cssClass:"il-cat-police" },
  { key:"Fire",     label:"Fire / Alarm",   cssClass:"il-cat-fire" },
  { key:"Vendor",   label:"Vendor visit",   cssClass:"il-cat-vendor" },
  { key:"Other",    label:"Other",          cssClass:"il-cat-other" }
];

/* STATE */
var SETTINGS_CACHE = null;
var INCIDENTS = [];
var ARCHIVED = [];
var archivedLoaded = false;
var activeFilter = "all";
var agentName = null;

/* HELPERS */
function esc(s){
  if(s == null) return "";
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(iso){
  if(!iso) return "";
  var t = new Date(iso).getTime();
  var diff = Date.now() - t;
  if(diff < 60000) return "just now";
  if(diff < 3600000) return Math.round(diff/60000) + " min ago";
  if(diff < 86400000) return Math.round(diff/3600000) + "h ago";
  return Math.round(diff/86400000) + "d ago";
}
function formatAbsoluteTime(iso){
  if(!iso) return "";
  var d = new Date(iso);
  if(isNaN(d.getTime())) return "";
  var now = new Date();
  var sameDay = d.toDateString() === now.toDateString();
  var h = d.getHours(); var m = d.getMinutes();
  var ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if(h === 0) h = 12;
  var mm = (m < 10 ? "0" : "") + m;
  var timeStr = h + ":" + mm + " " + ampm;
  if(sameDay) return timeStr + " today";
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getDate() + " \u00B7 " + timeStr;
}

function loadAgent(){
  try {
    var raw = localStorage.getItem("il_agent");
    if(!raw) return null;
    var data = JSON.parse(raw);
    if(Date.now() - data.t > 12*3600*1000) return null;
    return data.name;
  } catch(e){ return null; }
}
function saveAgent(name){
  try { localStorage.setItem("il_agent", JSON.stringify({name:name, t:Date.now()})); } catch(e){}
  agentName = name;
}
function updateAgentTag(){
  document.getElementById("agentTag").textContent = agentName ? ("Signed in: " + agentName) : "";
}

function loadSettings(){
  return fetch(WORKER_URL + "/settings")
    .then(function(r){ return r.json(); })
    .then(function(data){ SETTINGS_CACHE = (data && data.settings) || {}; })
    .catch(function(){ SETTINGS_CACHE = {}; });
}

/* SIGN-IN — FRONT DESK ONLY (per V1.02 design decision) */
function promptAgentName(){
  return new Promise(function(resolve){
    var roster = (SETTINGS_CACHE && SETTINGS_CACHE.frontDeskStaff) || [];
    var bg = document.createElement("div");
    bg.className = "il-signin-bg";
    var hasRoster = roster.length > 0;
    var optionsHtml = roster.map(function(n){ return '<option value="'+esc(n)+'">'+esc(n)+'</option>'; }).join('');
    bg.innerHTML =
      '<div class="il-signin">' +
        '<h3>Sign in</h3>' +
        '<p>Incident log is for front desk only. Pick your name.</p>' +
        (hasRoster ?
          '<select class="il-signin-select" id="agentSelect">' +
            '<option value="">— Pick a name —</option>' +
            optionsHtml +
            '<option value="__other__">Other (type a name)</option>' +
          '</select>' : '') +
        '<input class="il-signin-input" id="agentInput" type="text" placeholder="' + (hasRoster ? 'Or type your name' : 'Your name') + '" style="' + (hasRoster ? 'display:none' : '') + '">' +
        '<button class="il-signin-btn" id="agentSubmit">Continue</button>' +
      '</div>';
    document.body.appendChild(bg);
    var sel = document.getElementById("agentSelect");
    var inp = document.getElementById("agentInput");
    var btn = document.getElementById("agentSubmit");
    if(sel){
      sel.onchange = function(){
        if(sel.value === "__other__"){
          inp.style.display = ""; inp.value = "";
          setTimeout(function(){ inp.focus(); }, 50);
        } else {
          inp.style.display = "none"; inp.value = "";
        }
      };
      setTimeout(function(){ sel.focus(); }, 50);
    } else {
      setTimeout(function(){ inp.focus(); }, 50);
    }
    function finish(){
      var name = "";
      if(sel && sel.value && sel.value !== "__other__") name = sel.value.trim();
      else if(inp) name = (inp.value || "").trim();
      if(!name){
        if(sel && !sel.value) sel.focus();
        else if(inp) inp.focus();
        return;
      }
      saveAgent(name);
      updateAgentTag();
      document.body.removeChild(bg);
      resolve();
    }
    btn.onclick = finish;
    if(inp) inp.addEventListener("keydown", function(e){ if(e.key === "Enter") finish(); });
  });
}

function loadIncidents(){
  return fetch(WORKER_URL + "/incidents")
    .then(function(r){ return r.json(); })
    .then(function(data){
      INCIDENTS = (data && data.incidents) || [];
      INCIDENTS.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
    })
    .catch(function(){ INCIDENTS = []; });
}
function loadArchivedIncidents(){
  return fetch(WORKER_URL + "/incidents?status=archived")
    .then(function(r){ return r.json(); })
    .then(function(data){
      ARCHIVED = (data && data.incidents) || [];
      ARCHIVED.sort(function(a,b){ return new Date(b.archivedAt || b.createdAt) - new Date(a.archivedAt || a.createdAt); });
      archivedLoaded = true;
    })
    .catch(function(){ ARCHIVED = []; });
}

function categoryMeta(cat){
  return CATEGORIES.filter(function(c){ return c.key === cat; })[0] || CATEGORIES[CATEGORIES.length - 1];
}

function renderChips(){
  var open = INCIDENTS.filter(function(i){ return i && i.status === "open"; }).length;
  var resolved = INCIDENTS.filter(function(i){ return i && i.status === "resolved"; }).length;
  var html = '';
  html += '<button class="il-chip' + (activeFilter === "all" ? " active" : "") + '" data-filter="all">' +
    'All <span class="il-chip-count">' + open + '/' + (open + resolved) + '</span>' +
  '</button>';
  html += '<button class="il-chip' + (activeFilter === "open" ? " active" : "") + '" data-filter="open">' +
    'Open <span class="il-chip-count">' + open + '</span>' +
  '</button>';
  html += '<button class="il-chip' + (activeFilter === "resolved" ? " active" : "") + '" data-filter="resolved">' +
    'Resolved <span class="il-chip-count">' + resolved + '</span>' +
  '</button>';
  html += '<button class="il-chip' + (activeFilter === "archived" ? " active" : "") + '" data-filter="archived">' +
    'Archived' +
    (archivedLoaded ? ' <span class="il-chip-count">' + ARCHIVED.length + '</span>' : '') +
  '</button>';
  document.getElementById("chips").innerHTML = html;
  document.querySelectorAll(".il-chip").forEach(function(btn){
    btn.onclick = function(){
      var newFilter = btn.getAttribute("data-filter");
      if(newFilter === "archived" && !archivedLoaded){
        var listEl = document.getElementById("list");
        if(listEl) listEl.innerHTML = '<div class="il-empty"><div class="il-empty-icon">\u22EF</div>Loading…</div>';
        loadArchivedIncidents().then(function(){
          activeFilter = newFilter;
          renderChips();
          renderList();
        });
      } else {
        activeFilter = newFilter;
        renderChips();
        renderList();
      }
    };
  });
}

function renderList(){
  var listEl = document.getElementById("list");
  var src = [];
  if(activeFilter === "archived") src = ARCHIVED.slice();
  else if(activeFilter === "all") src = INCIDENTS.slice();
  else src = INCIDENTS.filter(function(i){ return i.status === activeFilter; });

  if(src.length === 0){
    var msg = activeFilter === "archived" ? "No archived incidents."
            : activeFilter === "open"     ? "No open incidents. All clear."
            : activeFilter === "resolved" ? "No resolved incidents yet."
            : "No incidents yet.";
    listEl.innerHTML = '<div class="il-empty"><div class="il-empty-icon">\u2713</div>' + msg + '</div>';
    return;
  }
  listEl.innerHTML = src.map(renderCardHtml).join('');
  document.querySelectorAll(".il-btn[data-action]").forEach(function(btn){
    btn.onclick = function(){
      var id = btn.getAttribute("data-id");
      var action = btn.getAttribute("data-action");
      handleAction(id, action, btn);
    };
  });
}

function renderCardHtml(inc){
  var f = inc.fields || {};
  var catMeta = categoryMeta(f.category);
  var isResolved = inc.status === "resolved";
  var isArchived = inc.status === "archived";

  var rows = [];
  if(f.occurredAt) rows.push('<div class="il-row"><span class="il-label">Occurred</span>' + esc(formatAbsoluteTime(f.occurredAt)) + '</div>');
  if(f.reportedBy) rows.push('<div class="il-row"><span class="il-label">Reported by</span>' + esc(f.reportedBy) + '</div>');
  if(f.description) rows.push('<div class="il-row"><span class="il-label">What happened</span>' + esc(f.description) + '</div>');
  if(f.involvedParties) rows.push('<div class="il-row"><span class="il-label">Involved</span>' + esc(f.involvedParties) + '</div>');
  if(f.witnesses) rows.push('<div class="il-row"><span class="il-label">Witnesses</span>' + esc(f.witnesses) + '</div>');
  if(f.actionTaken) rows.push('<div class="il-row"><span class="il-label">Action taken</span>' + esc(f.actionTaken) + '</div>');

  var processedMeta = "";
  var notesHtml = "";
  if(isResolved || isArchived){
    var lines = [];
    if(inc.processedBy) lines.push('<span>Resolved by ' + esc(inc.processedBy) + '</span>');
    if(inc.processedAt) lines.push('<span>' + esc(timeAgo(inc.processedAt)) + '</span>');
    if(isArchived && inc.archivedAt) lines.push('<span>Archived ' + esc(timeAgo(inc.archivedAt)) + '</span>');
    if(lines.length) processedMeta = '<div class="il-card-meta">' + lines.join('') + '</div>';
    var procNotes = (inc.notes || []).filter(function(n){ return n && n.type === "process"; });
    if(procNotes.length){
      notesHtml = '<div class="il-card-notes">' +
        procNotes.map(function(n){
          return '<div class="il-note">' + esc(n.text || "") + '</div>' +
                 '<div class="il-note-meta">' + esc(n.author || "") + ' \u00B7 ' + esc(timeAgo(n.at)) + '</div>';
        }).join('<hr style="border:none;border-top:1px solid var(--line);margin:6px 0">') +
      '</div>';
    }
  }

  var reportLink = '<a class="il-report-link" href="' + WORKER_URL + '/incident/' + esc(inc.id) + '" target="_blank" rel="noopener" title="View &amp; print">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
    'View / Print' +
  '</a>';

  var actions = '';
  if(isArchived){
    actions = '<div class="il-card-actions">' + reportLink +
      '<button class="il-btn il-btn-restore" data-id="' + esc(inc.id) + '" data-action="restore">\u21BA Restore</button>' +
    '</div>';
  } else if(isResolved){
    actions = '<div class="il-card-actions">' + reportLink +
      '<button class="il-btn il-btn-archive" data-id="' + esc(inc.id) + '" data-action="archive">Archive</button>' +
    '</div>';
  } else {
    actions = '<div class="il-card-actions">' + reportLink +
      '<button class="il-btn il-btn-resolve" data-id="' + esc(inc.id) + '" data-action="resolve">\u2713 Mark Resolved</button>' +
      '<button class="il-btn il-btn-archive" data-id="' + esc(inc.id) + '" data-action="archive">Archive</button>' +
    '</div>';
  }

  var statusClass = isArchived ? "il-status-archived" : (isResolved ? "il-status-resolved" : "il-status-open");
  var statusLabel = inc.status || "open";

  return '<div class="il-card' + (isArchived ? ' is-archived' : isResolved ? ' is-resolved' : '') + '">' +
    '<div class="il-card-head">' +
      '<span class="il-card-id">' + esc(inc.id) + '</span>' +
      '<span class="il-category ' + catMeta.cssClass + '">' + esc(catMeta.label) + '</span>' +
      '<span class="il-status-badge ' + statusClass + '">' + esc(statusLabel) + '</span>' +
      '<div class="il-time-block">' +
        '<div class="il-time-rel">' + esc(timeAgo(inc.createdAt)) + '</div>' +
        '<div class="il-time-abs">' + esc(formatAbsoluteTime(inc.createdAt)) + '</div>' +
      '</div>' +
    '</div>' +
    (f.title ? '<div class="il-card-title">' + esc(f.title) + '</div>' : '') +
    '<div class="il-card-body">' + rows.join('') + '</div>' +
    notesHtml +
    processedMeta +
    actions +
  '</div>';
}

/* ACTIONS */
function handleAction(id, action, btn){
  if(action === "resolve"){ openResolveModal(id); return; }
  btn.disabled = true;
  var url, payload;
  if(action === "archive"){
    url = "/incident/archive";
    payload = { id: id, archivedBy: agentName || "Unknown" };
  } else if(action === "restore"){
    /* No restore endpoint built; archive flips priorStatus on the record itself.
       For V1.02 restore = just call /incident/archive's inverse — flip status back.
       Quick fix: PATCH via /incident/process is not right either. Use /request/restore pattern?
       NOTE: Worker doesn't have /incident/restore. Skip for now — restore is rare.
       Instead, set action="restore" to NO-OP with notice. */
    btn.disabled = false;
    alert("Restore not yet wired for incident log. Contact admin.");
    return;
  }
  fetch(WORKER_URL + url, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data && data.ok) doRefresh();
    else { btn.disabled = false; alert("Action failed. Please try again."); }
  })
  .catch(function(){ btn.disabled = false; alert("Network error."); });
}

function openResolveModal(id){
  var inc = INCIDENTS.filter(function(i){ return i.id === id; })[0];
  if(!inc) return;
  var bg = document.createElement("div");
  bg.className = "il-modal-bg";
  bg.innerHTML =
    '<div class="il-modal">' +
      '<h3>Resolve Incident</h3>' +
      '<p>Add a note describing how this incident was resolved. The print report will include this note for audit.</p>' +
      '<div class="il-modal-field">' +
        '<label>Resolution note (optional but recommended)</label>' +
        '<textarea class="il-modal-textarea" id="resolveNote" placeholder="What was done, who was notified, follow-up actions, etc."></textarea>' +
      '</div>' +
      '<div class="il-modal-actions">' +
        '<button class="il-modal-btn-cancel" id="resCancel">Cancel</button>' +
        '<button class="il-modal-btn-confirm" id="resConfirm">Mark Resolved</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(bg);
  setTimeout(function(){ document.getElementById("resolveNote").focus(); }, 50);
  function close(){ if(bg.parentNode) bg.parentNode.removeChild(bg); }
  document.getElementById("resCancel").onclick = close;
  bg.onclick = function(e){ if(e.target === bg) close(); };
  document.getElementById("resConfirm").onclick = function(){
    var note = document.getElementById("resolveNote").value.trim();
    var btn = document.getElementById("resConfirm");
    btn.disabled = true; btn.textContent = "…";
    fetch(WORKER_URL + "/incident/process", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: id, processedBy: agentName || "Unknown", note: note })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.ok){ close(); doRefresh(); }
      else { btn.disabled = false; btn.textContent = "Mark Resolved"; alert("Failed."); }
    })
    .catch(function(){ btn.disabled = false; btn.textContent = "Mark Resolved"; alert("Network error."); });
  };
}

function openAddModal(){
  var bg = document.createElement("div");
  bg.className = "il-modal-bg";
  var catOpts = CATEGORIES.map(function(c){ return '<option value="' + esc(c.key) + '">' + esc(c.label) + '</option>'; }).join('');
  /* default occurredAt = now */
  var now = new Date();
  var tzOffset = now.getTimezoneOffset() * 60000;
  var nowLocal = new Date(now - tzOffset).toISOString().slice(0,16);
  bg.innerHTML =
    '<div class="il-modal">' +
      '<h3>Log New Incident</h3>' +
      '<p>Record an event for the property\u2019s audit trail. The printable report will be generated automatically.</p>' +
      '<div class="il-modal-row">' +
        '<div class="il-modal-field"><label>Category</label><select class="il-modal-select" id="iCat">' + catOpts + '</select></div>' +
        '<div class="il-modal-field"><label>Occurred At</label><input class="il-modal-input" id="iWhen" type="datetime-local" value="' + nowLocal + '"></div>' +
      '</div>' +
      '<div class="il-modal-field"><label>Title / short summary *</label><input class="il-modal-input" id="iTitle" placeholder="e.g., Lobby slip - elderly guest"></div>' +
      '<div class="il-modal-field"><label>What happened *</label><textarea class="il-modal-textarea" id="iDesc" placeholder="Describe the event in detail — time, place, sequence of events…"></textarea></div>' +
      '<div class="il-modal-field"><label>Involved parties</label><input class="il-modal-input" id="iInv" placeholder="Guest names, room numbers, staff present"></div>' +
      '<div class="il-modal-field"><label>Witnesses</label><input class="il-modal-input" id="iWit" placeholder="Anyone who saw what happened"></div>' +
      '<div class="il-modal-field"><label>Action taken</label><textarea class="il-modal-textarea" id="iAct" placeholder="What was done immediately — ice pack, manager called, police contacted, etc."></textarea></div>' +
      '<div class="il-modal-actions">' +
        '<button class="il-modal-btn-cancel" id="addCancel">Cancel</button>' +
        '<button class="il-modal-btn-confirm" id="addConfirm">Save Incident</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(bg);
  setTimeout(function(){ document.getElementById("iTitle").focus(); }, 50);
  function close(){ if(bg.parentNode) bg.parentNode.removeChild(bg); }
  document.getElementById("addCancel").onclick = close;
  bg.onclick = function(e){ if(e.target === bg) close(); };
  document.getElementById("addConfirm").onclick = function(){
    var title = document.getElementById("iTitle").value.trim();
    var desc  = document.getElementById("iDesc").value.trim();
    var when  = document.getElementById("iWhen").value;
    if(!title){ alert("Title required."); return; }
    if(!desc){ alert("Description required."); return; }
    var occurredAt = "";
    if(when){
      try { occurredAt = new Date(when).toISOString(); } catch(e){}
    }
    var payload = {
      fields: {
        category: document.getElementById("iCat").value,
        title: title,
        description: desc,
        occurredAt: occurredAt,
        reportedBy: agentName || "Unknown",
        involvedParties: document.getElementById("iInv").value.trim(),
        witnesses: document.getElementById("iWit").value.trim(),
        actionTaken: document.getElementById("iAct").value.trim()
      }
    };
    var btn = document.getElementById("addConfirm");
    btn.disabled = true; btn.textContent = "…";
    fetch(WORKER_URL + "/incident", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.ok){ close(); doRefresh(); }
      else { btn.disabled = false; btn.textContent = "Save Incident"; alert("Save failed."); }
    })
    .catch(function(){ btn.disabled = false; btn.textContent = "Save Incident"; alert("Network error."); });
  };
}

document.getElementById("addBtn").onclick = openAddModal;

function updateLastUpdated(){
  var t = new Date();
  var h = t.getHours(); var m = t.getMinutes();
  var ap = h >= 12 ? "PM" : "AM";
  h = h % 12; if(h===0) h = 12;
  if(m < 10) m = "0" + m;
  document.getElementById("updatedLabel").textContent = "Updated " + h + ":" + m + " " + ap;
}

function doRefresh(){
  var btn = document.getElementById("refreshBtn");
  if(btn) btn.disabled = true;
  var ps = [loadIncidents()];
  if(archivedLoaded) ps.push(loadArchivedIncidents());
  return Promise.all(ps).then(function(){
    renderChips();
    renderList();
    updateLastUpdated();
  }).finally(function(){
    if(btn) btn.disabled = false;
  });
}
document.getElementById("refreshBtn").onclick = doRefresh;

(function init(){
  loadSettings().then(function(){
    var existing = loadAgent();
    if(existing){
      agentName = existing;
      updateAgentTag();
      doRefresh();
    } else {
      promptAgentName().then(function(){
        doRefresh();
      });
    }
  });
})();
</script>
