<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0f1f3d">
<title>Maintenance &mdash; Quality Inn McAlester</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a2233; --ink-soft: #4a5468; --ink-mute: #8a93a6;
  --line: #e7e3da; --line-soft: #f0ece2;
  --paper: #faf8f3; --paper-card: #ffffff;
  --brand: #0f1f3d; --accent: #b88947;
  --good: #2d6a4f; --good-soft: #e8f1ec;
  --warn: #b7791f; --warn-soft: #fbeed7;
  --alert: #b03a3a; --alert-soft: #f6e3e0;
  --neutral: #6b7280; --neutral-soft: #eef0f3;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--paper); color: var(--ink);
  font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  min-height: 100vh; }
h1, h2 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; margin: 0; }
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; font-size: 16px; }

.mt-top { background: var(--brand); color: #fff;
  padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.mt-logo { font-size: 22px; }
.mt-title h1 { font-size: 17px; color: #fff; }
.mt-title p { font-size: 11px; color: rgba(255,255,255,0.6); margin: 2px 0 0; }
.mt-agent { margin-left: auto; background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.85); padding: 6px 12px; border-radius: 99px;
  font-size: 11px; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; }

.mt-lock { position: fixed; inset: 0; background: var(--brand);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; z-index: 200; }
.mt-lock-card { background: var(--paper-card); border-radius: 16px;
  padding: 28px 24px 24px; width: 100%; max-width: 360px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.25); }
.mt-lock-icon { font-size: 32px; text-align: center; margin-bottom: 8px; opacity: 0.85; }
.mt-lock-title { font-family: 'Playfair Display', Georgia, serif;
  font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 4px; }
.mt-lock-sub { font-size: 13px; color: var(--ink-soft); text-align: center; margin-bottom: 20px; }
.mt-lock-input { width: 100%; padding: 14px; border: 1.5px solid var(--line);
  border-radius: 8px; font-size: 16px; margin-bottom: 12px; outline: none; }
.mt-lock-input:focus { border-color: var(--accent); }
.mt-lock-btn { width: 100%; background: var(--brand); color: #fff; border: none;
  border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 600; }
.mt-lock-btn:hover { background: #1a2f52; }
.mt-lock-err { color: var(--alert); font-size: 12px; margin-top: 8px;
  text-align: center; min-height: 14px; }

.mt-main { padding: 16px 14px 80px; max-width: 720px; margin: 0 auto; }
.mt-section-h { font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--ink-mute); padding: 18px 4px 8px;
  display: flex; align-items: center; gap: 6px; }
.mt-section-h.toggle { cursor: pointer; user-select: none; }
.mt-count { background: var(--neutral-soft); color: var(--ink-soft);
  padding: 2px 8px; border-radius: 99px; font-size: 10px; }

.mt-card { background: var(--paper-card); border: 1px solid var(--line);
  border-radius: 12px; padding: 16px; margin-bottom: 10px;
  box-shadow: 0 1px 3px rgba(15,31,61,0.04); }
.mt-card-top { display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px; gap: 10px; }
.mt-room-l { font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-mute); margin-bottom: 2px; }
.mt-room { font-family: 'Playfair Display', Georgia, serif; font-size: 24px;
  font-weight: 600; color: var(--brand); line-height: 1; }
.mt-card-id { font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--ink-mute); margin-top: 4px; }

.mt-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 4px 10px; border-radius: 99px;
  display: inline-flex; align-items: center; gap: 4px; }
.mt-b-open { background: var(--alert-soft); color: var(--alert); }
.mt-b-progress { background: var(--warn-soft); color: var(--warn); }
.mt-b-done { background: var(--good-soft); color: var(--good); }

.mt-issue { font-size: 15px; line-height: 1.5; color: var(--ink); margin: 8px 0; }
.mt-meta { font-size: 12px; color: var(--ink-soft);
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
.mt-meta b { color: var(--ink); font-weight: 600; }

.mt-notes-label { font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--ink-mute); margin: 14px 0 6px; }
.mt-notes-input { width: 100%; border: 1px solid var(--line);
  border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none;
  resize: vertical; min-height: 60px; background: var(--paper); }
.mt-notes-input:focus { border-color: var(--accent); background: var(--paper-card); }
.mt-notes-display { background: var(--paper); border: 1px dashed var(--line);
  border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--ink-soft);
  white-space: pre-wrap; }

.mt-actions { display: flex; gap: 8px; margin-top: 14px; }
.mt-btn { flex: 1; border: none; border-radius: 10px;
  padding: 13px 14px; font-size: 14px; font-weight: 700;
  letter-spacing: 0.02em; transition: opacity 0.15s; }
.mt-btn-start { background: var(--warn); color: #fff; }
.mt-btn-done { background: var(--good); color: #fff; }
.mt-btn-save { background: var(--brand); color: #fff; }
.mt-btn:hover { opacity: 0.92; }
.mt-saved { color: var(--good); font-size: 12px; font-weight: 600;
  margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
.mt-saved.show { opacity: 1; }

.mt-empty { text-align: center; padding: 40px 20px;
  color: var(--ink-mute); font-size: 14px; }
.mt-empty-icon { font-size: 32px; opacity: 0.4; margin-bottom: 10px; }

.mt-collapsed { display: none; }
.mt-collapsed.show { display: block; }
.mt-section-h.toggle:after { content: " ▼"; opacity: 0.5; font-size: 9px; }
.mt-section-h.toggle.open:after { content: " ▲"; }

.mt-refresh-note { text-align: center; font-size: 10px;
  color: var(--ink-mute); padding: 8px; }

/* Case management on maintenance cards */
.mt-cn-label { font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-mute); margin-top: 12px; margin-bottom: 4px; }
.mt-cn-current { background: var(--paper); border: 1px solid var(--line);
  border-radius: 6px; padding: 8px 10px; font-size: 13px;
  color: var(--ink); font-style: italic; }
.mt-cn-current.empty { color: var(--ink-mute); }
.mt-cn-assign { width: 100%; padding: 8px 10px; border: 1px solid var(--line);
  border-radius: 6px; font-size: 14px; background: var(--paper); outline: none;
  font-family: inherit; }
.mt-cn-assign:focus { border-color: var(--accent); }
.mt-cn-timeline { max-height: 180px; overflow-y: auto; background: var(--paper);
  border: 1px solid var(--line-soft); border-radius: 6px; padding: 6px 10px; }
.mt-cn-tl-item { padding: 6px 0; border-bottom: 1px solid var(--line-soft); font-size: 12px; }
.mt-cn-tl-item:last-child { border-bottom: none; }
.mt-cn-tl-meta { font-size: 10px; color: var(--ink-mute); margin-bottom: 2px; }
.mt-cn-tl-author { font-weight: 700; color: var(--ink-soft); }
.mt-cn-tl-text { color: var(--ink); white-space: pre-wrap; }
.mt-cn-note-input { width: 100%; padding: 8px 10px; border: 1px solid var(--line);
  border-radius: 6px; font-size: 14px; outline: none; resize: vertical;
  min-height: 50px; font-family: inherit; background: var(--paper); }
.mt-cn-note-input:focus { border-color: var(--accent); background: var(--paper-card); }
.mt-cn-note-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.mt-cn-note-row label { font-size: 11px; color: var(--ink-soft); cursor: pointer;
  display: flex; align-items: center; gap: 4px; }
.mt-cn-collapse { background: none; border: none; color: var(--accent);
  font-size: 11px; font-weight: 600; padding: 0; margin-top: 8px; cursor: pointer; }
.mt-cn-collapse:hover { text-decoration: underline; }
.mt-cn-block { display: none; }
.mt-cn-block.show { display: block; }
</style>
</head>
<body>

<div class="mt-lock" id="lockScreen">
  <div class="mt-lock-card">
    <div class="mt-lock-icon">&#128295;</div>
    <div class="mt-lock-title">Maintenance Log</div>
    <div class="mt-lock-sub">Quality Inn &amp; Suites McAlester</div>
    <input class="mt-lock-input" id="passInput" type="password" placeholder="Passcode" autocomplete="off">
    <input class="mt-lock-input" id="nameInput" placeholder="Your first name" style="display:none">
    <button class="mt-lock-btn" id="unlockBtn">Continue</button>
    <div class="mt-lock-err" id="lockErr"></div>
  </div>
</div>

<div class="mt-top" id="topbar" style="display:none">
  <div class="mt-logo">&#128295;</div>
  <div class="mt-title">
    <h1>Maintenance Log</h1>
    <p>Quality Inn &amp; Suites McAlester</p>
  </div>
  <button class="mt-agent" id="refreshBtn" onclick="manualRefresh()" style="margin-right:6px">&#8635; Refresh</button>
  <button class="mt-agent" id="agentTag" onclick="signOut()">&#128100; <span id="agentName">—</span></button>
</div>

<div class="mt-main" id="mainArea" style="display:none">
  <div class="mt-section-h" id="activeHeader">Active Work <span class="mt-count" id="activeCount">0</span></div>
  <div id="activeList"></div>

  <div class="mt-section-h toggle" id="doneHeader" onclick="toggleDone()">Completed (last 24h) <span class="mt-count" id="doneCount">0</span></div>
  <div class="mt-collapsed" id="doneList"></div>

  <div class="mt-refresh-note" id="lastUpdatedNote">Tap Refresh in the header to check for new work.</div>
</div>

<script>
var WORKER_URL = "https://qi-concierge.utah1225.workers.dev";
var SHIFT_HOURS = 12;
var REFRESH_MS = 15000;

var maintenance = [];
var agentName = null;
var pollTimer = null;

function esc(s){
  if(s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function ageOf(iso){
  if(!iso) return '';
  var t = Date.parse(iso);
  if(!t || isNaN(t)) return '';
  var diff = Date.now() - t;
  var m = Math.round(diff/60000);
  if(m < 60) return m + 'm ago';
  var h = Math.round(diff/3600000);
  if(h < 24) return h + 'h ago';
  return Math.round(diff/86400000) + 'd ago';
}

/* ───── SIGN IN ───── */
function loadAgent(){
  var raw = window.__mtAgent;
  if(!raw) return null;
  if(Date.now() - raw.signedInAt > SHIFT_HOURS*3600*1000) return null;
  return raw;
}
function saveAgent(name){
  window.__mtAgent = { name: name, signedInAt: Date.now() };
}
function signOut(){
  window.__mtAgent = null;
  agentName = null;
  if(pollTimer) clearInterval(pollTimer);
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('passInput').value = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').style.display = 'none';
  document.getElementById('passInput').focus();
}

document.getElementById('unlockBtn').onclick = handleUnlock;
document.getElementById('passInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') handleUnlock();
});
document.getElementById('nameInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') handleUnlock();
});

function handleUnlock(){
  var passInput = document.getElementById('passInput');
  var nameInput = document.getElementById('nameInput');
  var err = document.getElementById('lockErr');
  err.textContent = '';

  /* if name field hidden, this click is just the passcode step */
  if(nameInput.style.display === 'none'){
    var pass = passInput.value.trim();
    if(!pass){ err.textContent = 'Enter the passcode.'; return; }
    fetch(WORKER_URL + '/maintenance-verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passcode: pass })
    }).then(function(r){ return r.json(); })
      .then(function(data){
        if(data.ok){
          /* progress to the name step */
          nameInput.style.display = 'block';
          passInput.style.display = 'none';
          nameInput.focus();
        } else {
          err.textContent = 'Incorrect passcode.';
        }
      })
      .catch(function(){ err.textContent = 'Network error — try again.'; });
    return;
  }

  /* second step — name */
  var name = nameInput.value.trim();
  if(!name){ err.textContent = 'Enter your first name.'; return; }
  saveAgent(name);
  startApp();
}

function startApp(){
  var a = loadAgent();
  if(!a) return;
  agentName = a.name;
  document.getElementById('agentName').textContent = agentName;
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('mainArea').style.display = 'block';
  refresh();
  /* no auto-refresh — manual button + after-action refresh only */
}

/* ───── DATA ───── */
var STAFF_MT = [];
function loadStaffList(){
  return fetch(WORKER_URL + '/settings')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var s = (d && d.settings) || {};
      STAFF_MT = (s.maintenanceStaff || []).slice();
    })
    .catch(function(){ STAFF_MT = []; });
}
function refresh(){
  return loadStaffList().then(function(){
    return fetch(WORKER_URL + '/maintenance-log')
      .then(function(r){ return r.json(); })
      .then(function(data){
        maintenance = (data && data.maintenance) || [];
        render();
        updateLastUpdated();
      })
      .catch(function(){});
  });
}
function updateLastUpdated(){
  var note = document.getElementById('lastUpdatedNote');
  if(!note) return;
  var t = new Date();
  var h = t.getHours();
  var mn = t.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h === 0) h = 12;
  if(mn < 10) mn = '0' + mn;
  note.textContent = 'Last updated ' + h + ':' + mn + ' ' + ampm + ' — tap Refresh to check for new work.';
}
function manualRefresh(){
  var btn = document.getElementById('refreshBtn');
  if(btn){
    var orig = btn.innerHTML;
    btn.innerHTML = '…';
    btn.disabled = true;
    refresh().finally(function(){
      btn.innerHTML = orig;
      btn.disabled = false;
    });
  } else {
    refresh();
  }
}

function statusBadge(m){
  var s = (m.status || 'Open').toLowerCase();
  if(s === 'in progress') return '<span class="mt-badge mt-b-progress">In Progress</span>';
  if(s === 'done')        return '<span class="mt-badge mt-b-done">Done</span>';
  return '<span class="mt-badge mt-b-open">Open</span>';
}

function cardHtml(m){
  var s = (m.status || 'Open').toLowerCase();
  var assigned = m.assignedTech || '';
  var actions = '';
  if(s === 'open'){
    actions =
      '<div class="mt-actions">' +
        '<button class="mt-btn mt-btn-start" onclick="startWork(\'' + esc(m.id) + '\')">Start Working</button>' +
      '</div>';
  } else if(s === 'in progress'){
    actions =
      '<div class="mt-actions">' +
        '<button class="mt-btn mt-btn-save" onclick="saveNotes(\'' + esc(m.id) + '\')">Save Notes</button>' +
        '<button class="mt-btn mt-btn-done" onclick="markDone(\'' + esc(m.id) + '\')">Mark Done</button>' +
      '</div>' +
      '<div class="mt-saved" id="saved-' + esc(m.id) + '">Saved</div>';
  } else {
    /* done — read only on this page (front desk closes) */
    actions = '<div style="margin-top:10px;font-size:12px;color:var(--ink-mute)">Awaiting front-desk inspection.</div>';
  }

  var notesBlock = '';
  if(s === 'in progress'){
    notesBlock =
      '<div class="mt-notes-label">Fix Notes</div>' +
      '<textarea class="mt-notes-input" id="notes-' + esc(m.id) + '" placeholder="What did you do, parts used, etc.">' + esc(m.fixNotes || '') + '</textarea>';
  } else if(m.fixNotes){
    notesBlock =
      '<div class="mt-notes-label">Fix Notes</div>' +
      '<div class="mt-notes-display">' + esc(m.fixNotes) + '</div>';
  }

  /* Build guest name from various possible fields (case shape OR legacy maint shape) */
  var gname = m.guestName || ((m.firstName || '') + ' ' + (m.lastName || '')).trim() || '';
  var issue = m.issue || m.description || m.summary || 'No description.';
  /* Reassign back to front desk button — available on all status states */
  var reassignBtn = '<button class="mt-btn" style="flex:0 0 auto;background:#e6edf7;color:#0f1f3d;margin-top:8px;padding:9px 14px;font-size:12px" '+
    'onclick="bounceBackToFrontDesk(\'' + esc(m.id) + '\')">&#8617; Not maintenance — send to Front Desk</button>';
  return '<div class="mt-card">' +
    '<div class="mt-card-top">' +
      '<div>' +
        '<div class="mt-room-l">Room</div>' +
        '<div class="mt-room">' + esc(m.room || '—') + '</div>' +
      '</div>' +
      '<div style="text-align:right">' + statusBadge(m) +
        '<div class="mt-card-id">' + esc(m.id) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="mt-issue">' + esc(issue) + '</div>' +
    '<div class="mt-meta">' +
      (gname ? '<span><b>Guest:</b> ' + esc(gname) + '</span>' : '') +
      '<span><b>Opened:</b> ' + esc(ageOf(m.createdAt)) + '</span>' +
      (assigned ? '<span><b>Assigned:</b> ' + esc(assigned) + '</span>' : '') +
    '</div>' +
    notesBlock +
    actions +
    reassignBtn +
    caseMgmtBlockHtml(m) +
  '</div>';
}

function render(){
  var active = maintenance.filter(function(m){
    var s = (m.status || 'Open').toLowerCase();
    return s === 'open' || s === 'in progress';
  });
  /* sort: in-progress first, then by age (oldest first) */
  active.sort(function(a,b){
    var sa = (a.status || '').toLowerCase() === 'in progress' ? 0 : 1;
    var sb = (b.status || '').toLowerCase() === 'in progress' ? 0 : 1;
    if(sa !== sb) return sa - sb;
    return (Date.parse(a.createdAt) || 0) - (Date.parse(b.createdAt) || 0);
  });

  var done24h = maintenance.filter(function(m){
    if((m.status || '').toLowerCase() !== 'done') return false;
    var t = Date.parse(m.updatedAt || m.createdAt);
    return t && (Date.now() - t) < 24*3600*1000;
  });
  /* newest first */
  done24h.sort(function(a,b){
    return (Date.parse(b.updatedAt || b.createdAt) || 0) - (Date.parse(a.updatedAt || a.createdAt) || 0);
  });

  document.getElementById('activeCount').textContent = active.length;
  document.getElementById('doneCount').textContent = done24h.length;

  var activeList = document.getElementById('activeList');
  if(active.length === 0){
    activeList.innerHTML = '<div class="mt-empty"><div class="mt-empty-icon">&#10003;</div>No active work right now. Nice.</div>';
  } else {
    activeList.innerHTML = active.map(cardHtml).join('');
  }

  var doneList = document.getElementById('doneList');
  if(done24h.length === 0){
    doneList.innerHTML = '<div class="mt-empty" style="padding:20px 10px;font-size:13px">No work completed in the last 24 hours.</div>';
  } else {
    doneList.innerHTML = done24h.map(cardHtml).join('');
  }
}

function toggleDone(){
  var hd = document.getElementById('doneHeader');
  var dl = document.getElementById('doneList');
  hd.classList.toggle('open');
  dl.classList.toggle('show');
}


function bounceBackToFrontDesk(id){
  if(!confirm('Send this back to the Front Desk? They\'ll handle it from there.')) return;
  fetch(WORKER_URL + '/case/reassign', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id, owner: 'frontDesk', reassignedBy: agentName || 'Maintenance' })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ alert('Could not reassign: ' + d.error); return; }
      refresh();
    })
    .catch(function(){ alert('Network error — try again.'); });
}


function escAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtAgeShort(iso){
  if(!iso) return '';
  var t = Date.parse(iso); if(!t || isNaN(t)) return '';
  var diff = Date.now() - t;
  if(diff < 60000) return 'just now';
  var min = Math.round(diff/60000);
  if(min < 60) return min + 'm ago';
  var h = Math.round(diff/3600000);
  if(h < 24) return h + 'h ago';
  return Math.round(diff/86400000) + 'd ago';
}
function staffOptionsMT(selected){
  var opts = '<option value="">(unassigned)</option>';
  STAFF_MT.forEach(function(n){
    var sel = (n === selected) ? ' selected' : '';
    opts += '<option value="' + escAttr(n) + '"' + sel + '>' + esc(n) + '</option>';
  });
  return opts;
}
function timelineMTHtml(c){
  var notes = (c.notes || []).slice().reverse();
  if(notes.length === 0){
    return '<div class="mt-cn-timeline"><div style="font-size:11px;color:var(--ink-mute);padding:4px 0">No timeline yet.</div></div>';
  }
  return '<div class="mt-cn-timeline">' +
    notes.map(function(n){
      return '<div class="mt-cn-tl-item">' +
        '<div class="mt-cn-tl-meta"><span class="mt-cn-tl-author">' + esc(n.author||'Unknown') + '</span> &middot; ' + esc(fmtAgeShort(n.at)) + '</div>' +
        '<div class="mt-cn-tl-text">' + esc(n.text) + '</div>' +
      '</div>';
    }).join('') +
    '</div>';
}

function caseMgmtBlockHtml(c){
  var id = esc(c.id);
  var assigned = (c.assignedTo && c.assignedTo.person) || '';
  var curNote = c.currentNote || '';
  return '<button class="mt-cn-collapse" onclick="toggleCnBlock(\''+id+'\')">&#9656; Notes &amp; assignment</button>' +
    '<div class="mt-cn-block" id="cn-' + id + '">' +
      '<div class="mt-cn-label">Current Status</div>' +
      '<div class="mt-cn-current ' + (curNote ? '' : 'empty') + '">' +
        esc(curNote || '(no current status — add a note below)') +
      '</div>' +
      '<div class="mt-cn-label">Assigned To</div>' +
      '<select class="mt-cn-assign" onchange="assignMaint(\''+id+'\', this.value)">' +
        staffOptionsMT(assigned) +
      '</select>' +
      '<div class="mt-cn-label">Timeline</div>' +
      timelineMTHtml(c) +
      '<div class="mt-cn-label">Add a Note</div>' +
      '<textarea class="mt-cn-note-input" id="mtnote-' + id + '" placeholder="What did you find or do?"></textarea>' +
      '<div class="mt-cn-note-row">' +
        '<label><input type="checkbox" id="mtupdcur-' + id + '" checked> Set as current status</label>' +
        '<button class="mt-btn mt-btn-save" style="flex:0 0 auto;padding:8px 14px;font-size:12px;margin-left:auto" onclick="addMaintNote(\''+id+'\')">Add Note</button>' +
      '</div>' +
    '</div>';
}

function toggleCnBlock(id){
  var el = document.getElementById('cn-' + id);
  if(el) el.classList.toggle('show');
}

function assignMaint(caseId, person){
  fetch(WORKER_URL + '/case/assign', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: caseId, team: 'maintenance', person: person || null, assignedBy: agentName || 'Maintenance' })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ alert('Could not assign: ' + d.error); return; }
      refresh();
    })
    .catch(function(){ alert('Network error.'); });
}

function addMaintNote(caseId){
  var ta = document.getElementById('mtnote-' + caseId);
  var cb = document.getElementById('mtupdcur-' + caseId);
  if(!ta) return;
  var text = ta.value.trim();
  if(!text){ ta.focus(); return; }
  fetch(WORKER_URL + '/case/note', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id: caseId, text: text, author: agentName || 'Maintenance',
      team: 'maintenance', type: 'note',
      updateCurrentNote: cb ? cb.checked : false
    })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ alert('Could not save note: ' + d.error); return; }
      ta.value = '';
      refresh();
    });
}
/* ───── ACTIONS ───── */
function findItem(id){
  return maintenance.find(function(x){ return x.id === id; });
}
function persist(m){
  /* Maintenance-owned items are cases — save them via /case so they sync with the dashboard */
  return fetch(WORKER_URL + '/case', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(m)
  }).then(function(r){ return r.json(); });
}
function startWork(id){
  var m = findItem(id); if(!m) return;
  m.status = 'In Progress';
  m.owner = 'maintenance';   /* lock owner just in case */
  m.assignedTech = agentName;
  m.updatedAt = new Date().toISOString();
  persist(m).then(refresh);
}
function saveNotes(id){
  var m = findItem(id); if(!m) return;
  var ta = document.getElementById('notes-' + id);
  if(!ta) return;
  m.fixNotes = ta.value;
  m.assignedTech = m.assignedTech || agentName;
  m.updatedAt = new Date().toISOString();
  persist(m).then(function(){
    var s = document.getElementById('saved-' + id);
    if(s){ s.classList.add('show'); setTimeout(function(){ s.classList.remove('show'); }, 1500); }
    refresh();
  });
}
function markDone(id){
  var m = findItem(id); if(!m) return;
  var ta = document.getElementById('notes-' + id);
  if(ta) m.fixNotes = ta.value;
  if(!m.fixNotes || !m.fixNotes.trim()){
    if(!confirm('Mark this done with no fix notes? Front desk usually wants a brief description of what was done.')) return;
  }
  m.status = 'Done';
  m.owner = 'maintenance';   /* still maintenance until front desk inspects + closes */
  m.assignedTech = m.assignedTech || agentName;
  m.completedBy = agentName;
  m.completedAt = new Date().toISOString();
  m.updatedAt = m.completedAt;
  persist(m).then(refresh);
}

/* ───── INIT ───── */
/* Passcode disabled — only ask for name. To re-enable, restore the prior init. */
(function init(){
  var a = loadAgent();
  if(a){
    document.getElementById('lockScreen').style.display = 'none';
    startApp();
    return;
  }
  document.getElementById('passInput').style.display = 'none';
  document.getElementById('nameInput').style.display = 'block';
  setTimeout(function(){ document.getElementById('nameInput').focus(); }, 100);
})();
</script>
