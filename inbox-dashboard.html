<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Front Desk — Quality Inn &amp; Suites McAlester on Hwy 69</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#faf7f2;color:#0f1f3d;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.dh-top{background:#0f1f3d;border-bottom:3px solid #c9964a;padding:11px 20px;
  display:flex;align-items:center;gap:14px;flex-shrink:0}
.dh-logo{width:36px;height:36px;border-radius:8px;background:#c9964a;display:flex;
  align-items:center;justify-content:center;font-size:18px}
.dh-title{flex:1}
.dh-title h1{font-size:15px;color:#fff;font-weight:700;font-family:'Playfair Display',Georgia,serif}
.dh-title p{font-size:11px;color:rgba(255,255,255,0.5)}
.dh-nav{display:flex;gap:4px}
.dh-nav-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;
  color:rgba(255,255,255,0.6);cursor:pointer;border:none;background:transparent;font-family:inherit}
.dh-nav-btn.active{background:#c9964a;color:#0f1f3d}

.dh-body{flex:1;overflow:hidden;display:flex}

/* ===== INBOX VIEW ===== */
.dh-list{width:290px;flex-shrink:0;background:#fff;border-right:1px solid #e2e0d8;overflow-y:auto}
.dh-list-h{padding:11px 15px;font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:#718096;border-bottom:1px solid #e2e0d8;position:sticky;top:0;background:#fff}
.dh-conv{padding:12px 15px;border-bottom:1px solid #f0eee6;cursor:pointer;position:relative}
.dh-conv:hover{background:#faf7f2}
.dh-conv.active{background:#f5efe4;border-left:3px solid #c9964a;padding-left:12px}
.dh-conv-top{display:flex;justify-content:space-between;margin-bottom:3px}
.dh-conv-name{font-size:14px;font-weight:700}
.dh-conv-time{font-size:10px;color:#718096}
.dh-conv-prev{font-size:12px;color:#4a5568;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;
  text-transform:uppercase;letter-spacing:.04em;margin-top:5px;display:inline-block}
.dh-b-web{background:#e3f0ff;color:#1a5ec4}
.dh-b-attn{background:#fbe9e7;color:#c0392b}
.dh-b-case{background:#fdeede;color:#b7791f}
.dh-attn-dot{position:absolute;top:13px;right:13px;width:8px;height:8px;border-radius:50%;background:#c53030}

.dh-view{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#faf7f2}
.dh-view-h{background:#fff;border-bottom:1px solid #e2e0d8;padding:12px 18px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dh-view-h h2{font-size:15px;font-weight:700}
.dh-view-h p{font-size:11px;color:#718096}
.dh-btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit}
.dh-btn-case{background:#c9964a;color:#0f1f3d}
.dh-btn-takeover{background:#0f1f3d;color:#fff}
.dh-thread{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px}
.dh-bub{max-width:72%;padding:9px 13px;border-radius:13px;font-size:13px;line-height:1.5}
.dh-bub-guest{background:#fff;border:1px solid #e2e0d8;align-self:flex-start;border-bottom-left-radius:3px}
.dh-bub-hotel{background:#0f1f3d;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.dh-bub-ai{background:#c9964a;color:#0f1f3d;align-self:flex-end;border-bottom-right-radius:3px}
.dh-bub-system{background:#eef2f6;color:#3a5a78;align-self:center;font-size:11px;text-align:center;border-radius:9px}
.dh-bub-l{font-size:9px;font-weight:700;text-transform:uppercase;opacity:.7;margin-bottom:2px}
.dh-bub-t{font-size:9px;opacity:.55;margin-top:3px}
.dh-ai-panel{background:#fff;border-top:1px solid #e2e0d8;padding:9px 18px;flex-shrink:0}
.dh-ai-head{font-size:10px;font-weight:700;color:#c9964a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.dh-ai-chips{display:flex;gap:6px;flex-wrap:wrap}
.dh-ai-chip{font-size:12px;background:#f5efe4;border:1.5px solid #e6d3ad;border-radius:13px;
  padding:6px 11px;cursor:pointer;color:#0f1f3d;text-align:left;line-height:1.4}
.dh-ai-chip:hover{background:#c9964a;color:#fff}
.dh-composer{background:#fff;border-top:1px solid #e2e0d8;padding:11px 18px;display:flex;
  gap:9px;align-items:flex-end;flex-shrink:0}
.dh-input{flex:1;border:1.5px solid #e2e0d8;border-radius:20px;padding:10px 15px;font-size:13px;
  font-family:inherit;resize:none;outline:none;max-height:80px;line-height:1.4}
.dh-input:focus{border-color:#c9964a}
.dh-send{background:#c9964a;border:none;border-radius:50%;width:40px;height:40px;
  color:#0f1f3d;font-size:16px;cursor:pointer;flex-shrink:0}

/* ===== CASES + MAINTENANCE TABLE VIEWS ===== */
.dh-panel{flex:1;overflow-y:auto;padding:22px}
.dh-panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dh-panel-h h2{font-size:18px;font-weight:700;font-family:'Playfair Display',Georgia,serif}
.dh-filter{display:flex;gap:6px}
.dh-fbtn{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;

.dh-fbtn.active{background:#0f1f3d;color:#fff;border-color:#0f1f3d}
.dh-card{background:#fff;border:1px solid #e2e0d8;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.dh-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.dh-case-id{font-size:11px;font-weight:700;color:#718096;font-family:monospace}
.dh-case-guest{font-size:15px;font-weight:700;margin-top:2px}
.dh-case-meta{font-size:12px;color:#718096;margin-top:3px}
.dh-status{font-size:10px;font-weight:700;padding:3px 10px;border-radius:11px;text-transform:uppercase}
.dh-s-open{background:#fbe9e7;color:#c0392b}
.dh-s-resolved{background:#fdeede;color:#b7791f}
.dh-s-closed{background:#e8f3ee;color:#2d6a4f}
.dh-case-summary{font-size:13px;color:#0f1f3d;margin:8px 0;line-height:1.5}
.dh-case-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;
  background:#eef2f6;color:#3a5a78;text-transform:uppercase}
.dh-case-actions{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.dh-ca-btn{font-size:11px;font-weight:600;padding:7px 12px;border-radius:7px;
  border:1.5px solid #e2e0d8;background:#fff;cursor:pointer;font-family:inherit;color:#0f1f3d}
.dh-ca-btn:hover{border-color:#c9964a}
.dh-ca-resolve{background:#fdeede;border-color:#e6d3ad}
.dh-ca-close{background:#e8f3ee;border-color:#bfe3cf}
.dh-empty{text-align:center;padding:50px;color:#718096}
.dh-empty-icon{font-size:42px;opacity:.4;margin-bottom:10px}

/* maintenance table */
.dh-mtable{width:100%;background:#fff;border:1px solid #e2e0d8;border-radius:12px;
  border-collapse:collapse;overflow:hidden}
.dh-mtable th{background:#0f1f3d;color:#fff;font-size:10px;text-transform:uppercase;
  letter-spacing:.05em;padding:10px 12px;text-align:left;font-weight:700}
.dh-mtable td{padding:11px 12px;font-size:13px;border-bottom:1px solid #f0eee6}
.dh-mtable tr:last-child td{border-bottom:none}
.dh-mt-input{width:100%;border:1px solid #e2e0d8;border-radius:6px;padding:6px 8px;
  font-size:12px;font-family:inherit}

.dh-empty-main{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:#718096;text-align:center}

.dh-bub-ai a, .dh-bub-staff a, .dh-bub-hotel a{color:#fdd28a;text-decoration:underline;word-break:break-all}
.dh-bub-guest a{color:#c9964a;text-decoration:underline;word-break:break-all}

/* GUEST DETAILS PANEL */
.dh-guest-panel{background:#fff;border-bottom:1px solid #e2e0d8;padding:11px 18px;
  display:flex;gap:9px;align-items:flex-end;flex-wrap:wrap;flex-shrink:0}
.dh-gp-field{display:flex;flex-direction:column;min-width:0}
.dh-gp-field label{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:#718096;margin-bottom:3px}
.dh-gp-input{border:1.5px solid #e2e0d8;border-radius:6px;padding:6px 9px;font-size:12px;
  font-family:inherit;outline:none}
.dh-gp-input:focus{border-color:#c9964a}
.dh-gp-w-name{width:90px}
.dh-gp-w-room{width:62px}
.dh-gp-w-phone{width:120px}
.dh-gp-w-date{width:115px}
.dh-gp-save{background:#2d6a4f;color:#fff;border:none;border-radius:6px;padding:7px 14px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;height:30px}
.dh-gp-save:hover{background:#235740}
.dh-gp-saved{color:#2d6a4f;font-size:11px;font-weight:600;margin-left:6px;align-self:center}
.dh-gp-archive{background:#fff;color:#6b7280;border:1.5px solid #e2e0d8;border-radius:6px;
  padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;height:30px}
.dh-gp-archive:hover{border-color:#c0392b;color:#c0392b}

/* STATUS BADGES — green/yellow/orange/red */
.dh-status-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:11px;text-transform:uppercase;letter-spacing:.04em}
.dh-sb-replied{background:#e8f3ee;color:#2d6a4f}
.dh-sb-ai{background:#eef2f6;color:#6b7280}
.dh-sb-waiting-low{background:#fff7e0;color:#a17600}
.dh-sb-waiting-mid{background:#ffe3c4;color:#9a4d00}
.dh-sb-waiting-high{background:#fbd8d4;color:#a72020;animation:pulseRed 1.6s infinite}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.55}}
.dh-sb-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dh-sb-replied .dh-sb-dot{background:#2d6a4f}
.dh-sb-ai .dh-sb-dot{background:#9aa3b0}
.dh-sb-waiting-low .dh-sb-dot{background:#e0a900}
.dh-sb-waiting-mid .dh-sb-dot{background:#d97a00}
.dh-sb-waiting-high .dh-sb-dot{background:#c53030}

/* ARCHIVE TAB BUTTON */

/* AGENT MODAL */
.dh-modal-bg{position:fixed;inset:0;background:rgba(15,31,61,0.55);
  display:flex;align-items:center;justify-content:center;z-index:1000}
.dh-modal{background:#fff;border-radius:14px;padding:26px 28px;width:340px;max-width:90%}
.dh-modal h3{font-size:17px;font-weight:700;margin-bottom:6px;font-family:'Playfair Display',Georgia,serif}
.dh-modal p{font-size:12px;color:#718096;margin-bottom:14px;line-height:1.5}
.dh-modal input{width:100%;padding:11px 13px;border:1.5px solid #e2e0d8;border-radius:8px;
  font-size:14px;font-family:inherit;outline:none;margin-bottom:12px}
.dh-modal input:focus{border-color:#c9964a}
.dh-modal-btn{width:100%;background:#c9964a;color:#0f1f3d;border:none;border-radius:8px;
  padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* AGENT BADGE IN TOPBAR */
.dh-agent-tag{font-size:11px;color:rgba(255,255,255,0.65);padding:5px 10px;
  background:rgba(255,255,255,0.07);border-radius:14px;margin-right:8px;cursor:pointer;
  border:none;font-family:inherit}
.dh-agent-tag:hover{background:rgba(255,255,255,0.13);color:#fff}

/* TOAST */
.dh-toast-wrap{position:fixed;top:80px;right:18px;display:flex;flex-direction:column;
  gap:10px;z-index:900;pointer-events:none}
.dh-toast{background:#fff;border-left:4px solid #c9964a;border-radius:8px;padding:11px 16px;
  box-shadow:0 4px 14px rgba(15,31,61,0.13);min-width:260px;max-width:360px;
  animation:slideIn .25s ease;pointer-events:auto;font-size:13px}
.dh-toast.lightning{border-left-color:#c9964a}
.dh-toast.excellent{border-left-color:#2d6a4f}
.dh-toast.slow{border-left-color:#b7791f}
.dh-toast.late{border-left-color:#c0392b}
.dh-toast-title{font-weight:700;font-size:13px;margin-bottom:2px}
.dh-toast-msg{font-size:12px;color:#4a5568}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* SCOREBOARD */
.dh-scoreboard{background:#fff;border:1px solid #e2e0d8;border-radius:12px;padding:14px 16px;
  margin-bottom:14px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;width:100%}
.dh-sb-block{flex:1;min-width:110px}
.dh-sb-label{font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em}
.dh-sb-value{font-size:22px;font-weight:700;color:#0f1f3d;line-height:1.1;margin-top:2px;
  font-family:'Playfair Display',Georgia,serif}
.dh-sb-detail{font-size:11px;color:#718096;margin-top:2px}
.dh-sb-grade{font-size:11px;font-weight:700;padding:3px 10px;border-radius:11px;text-transform:uppercase}
.dh-sb-g-excellent{background:#e8f3ee;color:#2d6a4f}
.dh-sb-g-good{background:#eef2f6;color:#3a5a78}
.dh-sb-g-slow{background:#fdeede;color:#b7791f}

.dh-takeover-btn{background:#c9964a;color:#0f1f3d;border:none;border-radius:22px;
  padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-right:8px;transition:background .15s}
.dh-takeover-btn:hover{background:#dbb069}
.dh-takeover-btn.active{background:#2d6a4f;color:#fff}
.dh-takeover-btn.active:hover{background:#235740}
</style>
</head>
<body>
<div class="dh-toast-wrap" id="toastWrap"></div>

<div class="dh-top">
  <div class="dh-logo">&#127976;</div>
  <div class="dh-title">
    <h1>Front Desk Console</h1>
    <p>Quality Inn &amp; Suites McAlester on Hwy 69</p>
  </div>
  <button class="dh-agent-tag" id="agentTag" onclick="changeAgent()">&#128100; Not signed in</button>
  <div class="dh-nav">
    <button class="dh-nav-btn active" data-view="inbox" onclick="nav(this)">&#128172; Inbox</button>
    <button class="dh-nav-btn" data-view="cases" onclick="nav(this)">&#128221; Cases</button>
    <button class="dh-nav-btn" data-view="maint" onclick="nav(this)">&#128295; Maintenance Log</button>
    <button class="dh-nav-btn" data-view="archive" onclick="nav(this)">&#128189; Archive</button>
  </div>
</div>

<div class="dh-body" id="body"></div>

<script>
/* ============================================================
   QUALITY INN McALESTER — FRONT DESK CONSOLE
   Inbox + Cases + Maintenance Log
   Set WORKER_URL to your deployed Cloudflare Worker.
   ============================================================ */
var WORKER_URL = "https://qi-concierge.utah1225.workers.dev";

/* ============================================================
   AGENT MANAGEMENT — who is at the front desk right now
   Persists in window memory for 12 hours.
   ============================================================ */
var AGENT_SHIFT_HOURS = 12;
function loadAgent(){
  var raw = window.__qiAgent;
  if(!raw) return null;
  if(Date.now() - raw.signedInAt > AGENT_SHIFT_HOURS*3600*1000) return null;
  return raw;
}
function saveAgent(name){
  window.__qiAgent = {name:name, signedInAt:Date.now()};
  updateAgentTag();
}
function clearAgent(){ window.__qiAgent = null; updateAgentTag(); }
function getAgentName(){ var a = loadAgent(); return a ? a.name : null; }
function updateAgentTag(){
  var tag = document.getElementById('agentTag');
  if(!tag) return;
  var a = loadAgent();
  tag.innerHTML = a ? '&#128100; ' + esc(a.name) : '&#128100; Not signed in';
}
function promptAgentName(reason){
  return new Promise(function(resolve){
    var bg = document.createElement('div');
    bg.className = 'dh-modal-bg';
    bg.innerHTML = '<div class="dh-modal">' +
      '<h3>Sign in to the front desk</h3>' +
      '<p>' + (reason || 'Your name will be shown to guests when you join their chat.') + '</p>' +
      '<input id="agentNameInput" placeholder="First name" autofocus>' +
      '<button class="dh-modal-btn" id="agentNameBtn">Start shift</button></div>';
    document.body.appendChild(bg);
    var input = document.getElementById('agentNameInput');
    var btn = document.getElementById('agentNameBtn');
    function submit(){
      var n = input.value.trim();
      if(!n){ input.focus(); return; }
      saveAgent(n);
      bg.remove();
      resolve(n);
    }
    btn.onclick = submit;
    input.addEventListener('keydown', function(e){ if(e.key === 'Enter') submit(); });
    setTimeout(function(){ input.focus(); }, 60);
  });
}
function changeAgent(){
  clearAgent();
  promptAgentName('Signing in a different agent.');
}

/* ============================================================
   RESPONSE-TIME GRADING + TOASTS + SCOREBOARD
   ============================================================ */
var GRADE_TIERS = [
  {max: 60000, key:'lightning', label:'&#9889; Lightning', toast:true,
   praise:['Incredible &mdash; under a minute!','Lightning fast!','That is a {sec}-second reply &mdash; wow!']},
  {max: 180000, key:'excellent', label:'&#10003; Excellent', toast:true,
   praise:['Nice work &mdash; {min}-minute reply.','Great &mdash; under 3 minutes!','Excellent response time, {min} min.']},
  {max: 600000, key:'good', label:'Good', toast:false, praise:['']},
  {max: 1200000, key:'slow', label:'Slow', toast:true,
   nudge:['{min}-min reply &mdash; try to get under 10 next time.','A bit slow at {min} min &mdash; aim for under 10.']},
  {max: Infinity, key:'late', label:'Late', toast:true,
   nudge:['{min}-min response &mdash; this guest waited a long time.','Late reply ({min} min). Please prioritize chat next time.']}
];
function gradeFor(ms){
  for(var i=0;i<GRADE_TIERS.length;i++){ if(ms <= GRADE_TIERS[i].max) return GRADE_TIERS[i]; }
  return GRADE_TIERS[GRADE_TIERS.length-1];
}
function showToast(grade, ms){
  var sec = Math.round(ms/1000);
  var min = Math.max(1, Math.round(ms/60000));
  var pool = grade.praise || grade.nudge || [''];
  var msg = pool[Math.floor(Math.random()*pool.length)]
              .replace('{sec}', sec).replace('{min}', min);
  var wrap = document.getElementById('toastWrap');
  if(!wrap) return;
  var t = document.createElement('div');
  t.className = 'dh-toast ' + grade.key;
  t.innerHTML = '<div class="dh-toast-title">' + grade.label + '</div>' +
                '<div class="dh-toast-msg">' + esc(msg) + '</div>';
  wrap.appendChild(t);
  setTimeout(function(){
    t.style.transition = 'opacity .3s';
    t.style.opacity = '0';
    setTimeout(function(){ t.remove(); }, 350);
  }, 4500);
}
function recordGrade(grade, ms){
  if(!window.__qiGrades) window.__qiGrades = {date:new Date().toDateString(), entries:[]};
  if(window.__qiGrades.date !== new Date().toDateString()){
    window.__qiGrades = {date:new Date().toDateString(), entries:[]};
  }
  window.__qiGrades.entries.push({grade:grade.key, ms:ms, at:Date.now()});
}
function todaysStats(){
  var g = window.__qiGrades;
  if(!g || g.date !== new Date().toDateString() || g.entries.length === 0)
    return {count:0, avg:0, fastCount:0, slowCount:0, lateCount:0};
  var total = 0, fast = 0, slow = 0, late = 0;
  g.entries.forEach(function(e){
    total += e.ms;
    if(e.grade === 'lightning' || e.grade === 'excellent') fast++;
    if(e.grade === 'slow') slow++;
    if(e.grade === 'late') late++;
  });
  return {count:g.entries.length, avg:total/g.entries.length,
          fastCount:fast, slowCount:slow, lateCount:late};
}
function overallGrade(stats){
  if(stats.count === 0) return {label:'No data', cls:'dh-sb-g-good'};
  if(stats.avg <= 180000 && stats.lateCount === 0) return {label:'Excellent', cls:'dh-sb-g-excellent'};
  if(stats.avg <= 600000 && stats.lateCount <= 1) return {label:'Good', cls:'dh-sb-g-good'};
  return {label:'Needs Speed', cls:'dh-sb-g-slow'};
}
function computeResponseMs(messages, staffIdx){
  for(var i = staffIdx - 1; i >= 0; i--){
    if(messages[i].from === 'guest'){
      var gT = messages[i].atMs || Date.parse(messages[i].at) || null;
      var sT = messages[staffIdx].atMs || Date.parse(messages[staffIdx].at) || null;
      if(gT && sT) return sT - gT;
    }
  }
  return null;
}
function renderScoreboard(){
  var slot = document.getElementById('scoreboardSlot');
  if(!slot) return;
  var stats = todaysStats();
  var grade = overallGrade(stats);
  var avgText = stats.count === 0 ? '&mdash;' : (function(ms){
    var s = Math.round(ms/1000); if(s<60) return s+'s'; return Math.round(s/60)+'m';
  })(stats.avg);
  slot.innerHTML =
    '<div class="dh-scoreboard">' +
      '<div class="dh-sb-block"><div class="dh-sb-label">Replies Today</div>' +
        '<div class="dh-sb-value">' + stats.count + '</div></div>' +
      '<div class="dh-sb-block"><div class="dh-sb-label">Avg Response</div>' +
        '<div class="dh-sb-value">' + avgText + '</div></div>' +

/* ---- robust display helpers — work for live AND demo conversation shapes ---- */
function guestDisplay(c){
  if(!c) return 'Guest';
  /* prefer guestInfo (set via intro card or staff edit) */
  if(c.guestInfo){
    var n = ((c.guestInfo.firstName||'') + ' ' + (c.guestInfo.lastName||'')).trim();
    if(n) return n;
  }
  if(c.guest && typeof c.guest === 'object'){

    return n2 || 'Web Guest';
  }
  if(typeof c.guest === 'string' && c.guest) return c.guest;

}
function roomDisplay(c){
  if(!c) return '—';
  if(c.guestInfo && c.guestInfo.room) return c.guestInfo.room;
  if(c.room) return c.room;
  if(c.guest && typeof c.guest === 'object' && c.guest.room) return c.guest.room;
  return '—';
}
function timeDisplay(c){
  if(!c) return '';
  if(c.time) return c.time;
  if(c.startedAt){
    try{ return new Date(c.startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
    catch(e){ return ''; }
  }
  if(c.updatedAt){
    try{ return new Date(c.updatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
    catch(e){ return ''; }
  }
  return '';
}

/* ── v3 helpers: status badges, archive logic, guest details panel ── */

function lastGuestMsgAt(c){
  if(!c || !c.messages) return null;
  for(var i=c.messages.length-1;i>=0;i--){
    var m=c.messages[i];
    if(m.from==='guest'){ return m.atMs || Date.parse(m.at) || null; }
  }
  return null;
}
function lastStaffMsgAt(c){
  if(!c || !c.messages) return null;
  for(var i=c.messages.length-1;i>=0;i--){
    var m=c.messages[i];
    if(m.from==='hotel'){ return m.atMs || Date.parse(m.at) || null; }
  }
  return null;
}

/* Most recent activity timestamp for sorting — falls back through possible fields */
function lastActivityMs(c){
  if(!c) return 0;
  if(c.messages && c.messages.length){
    var last = c.messages[c.messages.length-1];
    var t = last.atMs || Date.parse(last.at);
    if(t && !isNaN(t)) return t;
  }
  if(c.updatedAt){
    var u = Date.parse(c.updatedAt);
    if(u && !isNaN(u)) return u;
  }
  if(c.startedAt){
    var s = Date.parse(c.startedAt);
    if(s && !isNaN(s)) return s;
  }
  if(c.archivedAt){
    var a = Date.parse(c.archivedAt);
    if(a && !isNaN(a)) return a;
  }
  return 0;
}

function formatDur(ms){
  var s = Math.round(ms/1000);
  if(s<60) return s+'s';
  return Math.round(s/60)+'m';
}
function conversationStatus(c){
  if(!c) return {state:'ai', label:'AI handling', waitMs:0};
  var lastGuest = lastGuestMsgAt(c);
  var lastStaff = lastStaffMsgAt(c);
  if(!lastGuest) return {state:'ai', label:'AI handling', waitMs:0};
  if(lastStaff && lastStaff > lastGuest){
    var since = Date.now() - lastStaff;
    return {state:'replied', label:'Replied ' + formatDur(since) + ' ago', waitMs:since};
  }
  var wait = Date.now() - lastGuest;
  var min = Math.max(1, Math.round(wait/60000));
  if(wait < 5*60*1000) return {state:'wait-low', label: min + ' min waiting', waitMs:wait};
  if(wait < 10*60*1000) return {state:'wait-mid', label: min + ' min waiting', waitMs:wait};
  return {state:'wait-high', label: min + ' min waiting', waitMs:wait};
}
function badgeHtml(c){
  var s = conversationStatus(c);
  var cls = s.state==='replied'   ? 'dh-sb-replied'
          : s.state==='ai'        ? 'dh-sb-ai'
          : s.state==='wait-low'  ? 'dh-sb-waiting-low'
          : s.state==='wait-mid'  ? 'dh-sb-waiting-mid'
          : 'dh-sb-waiting-high';
  var icon = (s.state.indexOf('wait')===0) ? '&#9201;'
           : s.state==='replied' ? '&#10003;' : '&#129302;';
  return '<span class="dh-status-badge '+cls+'"><span class="dh-sb-dot"></span>'
       + icon + ' ' + esc(s.label) + '</span>';
}

/* archive logic */
function isArchived(c){ return c && c.archived === true; }
function shouldAutoArchive(c){
  if(!c || isArchived(c)) return false;
  var info = c.guestInfo || {};
  if(info.departureDate){
    var dep = new Date(info.departureDate + 'T23:59:59');
    if(!isNaN(dep) && Date.now() > dep.getTime()) return 'departure';
  }
  if(new Date().getDay() === 0){
    var lastT = lastGuestMsgAt(c) || lastStaffMsgAt(c) || 0;
    if(lastT && (Date.now() - lastT) > 7*24*3600*1000) return 'sunday-sweep';
  }
  return false;
}
function runArchiveSweep(){
  if(!conversations || !conversations.forEach) return;
  conversations.forEach(function(c){
    var why = shouldAutoArchive(c);
    if(why){
      c.archived = true;
      c.archivedAt = new Date().toISOString();
      c.archivedReason = why;
      if(WORKER_URL){
        fetch(WORKER_URL+'/conversation',{method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(c)}).catch(function(){});
      }
    }
  });
}
function archiveConversation(id){
  var c = conversations.find(function(x){return x.id===id;});
  if(!c) return;
  if(!confirm('Archive this conversation? You can restore it from the Archive tab.')) return;
  c.archived = true;
  c.archivedAt = new Date().toISOString();
  c.archivedReason = 'manual';
  if(WORKER_URL){
    fetch(WORKER_URL+'/conversation',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(c)}).catch(function(){});
  }
  activeConvId = null;
  renderInbox();
}
function restoreConversation(id){
  var c = conversations.find(function(x){return x.id===id;});
  if(!c) return;
  c.archived = false;
  c.archivedAt = null;
  if(WORKER_URL){
    fetch(WORKER_URL+'/conversation',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(c)}).catch(function(){});
  }
  renderInbox();
}

var activeConvId=null;
function renderInbox(){
  var body=document.getElementById('body');
  /* run archive sweep once per render */
  runArchiveSweep();
  var showArchived = (currentView === 'archive');
  body.innerHTML=
    '<div class="dh-list"><div class="dh-list-h">' +
      (showArchived ? 'Archived Conversations' : 'Guest Conversations') +
    '</div>'+
      '<div id="convList"></div></div>'+

      '<div style="margin-top:18px;width:100%;max-width:540px;padding:0 20px"><div id="scoreboardSlot"></div></div>'+
      '</div></div>';
  renderScoreboard();
  var list=document.getElementById('convList');
  var filtered = conversations.filter(function(c){ return showArchived ? isArchived(c) : !isArchived(c); });
  /* newest activity first */
  filtered.sort(function(a,b){ return lastActivityMs(b) - lastActivityMs(a); });
  if(filtered.length===0){
    list.innerHTML='<div class="dh-empty">'+ (showArchived ? 'No archived conversations.' : 'No conversations yet.') +'</div>';
    return;
  }
  filtered.forEach(function(c){
    var last=c.messages[c.messages.length-1];
    var div=document.createElement('div');
    div.className='dh-conv'+(c.id===activeConvId?' active':'');
    div.setAttribute('data-conv-id', c.id);

        '<span class="dh-conv-time">'+esc(timeDisplay(c))+'</span></div>'+

      '<div style="margin-top:6px">' + badgeHtml(c) + '</div>';
    list.appendChild(div);
  });
}
function openConv(id){

function getSuggestions(msg){
  if(WORKER_URL){
    return fetch(WORKER_URL+"/suggest",{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({guestMessage:msg})})
      .then(function(r){return r.json();})
      .then(function(d){return d.suggestions||[];})
      .catch(function(){return localSugg(msg);});
  }
  return Promise.resolve(localSugg(msg));
}
function localSugg(msg){
  var t=msg.toLowerCase();
  if(/ac|noise|loud|broken|not work|leak/.test(t))
    return["So sorry about that! I'm sending our maintenance team to your room right away.",
           "Apologies for the trouble — someone will be up within a few minutes to take a look.",
           "Thanks for letting us know. We'll get that fixed for you right away."];
  if(/breakfast/.test(t))
    return["Breakfast is served 6:00-9:00 AM daily — free hot breakfast included with your stay!",
           "Good morning! Hot breakfast runs 6-9 AM right off the lobby.",
           "We serve free hot breakfast 6-9 AM every day. Enjoy!"];
  if(/towel|clean|housekeep/.test(t))
    return["Of course — I'll have housekeeping bring those right up to your room.",
           "Happy to help! Fresh towels are on the way now.",
           "Thanks for letting us know — housekeeping will be up shortly."];
  return["Thank you for reaching out — happy to help with that!",
         "Thanks for your message! Let me take care of that for you.",
         "Happy to help — give me just a moment."];
}
function sendReply(id){
  var c=conversations.find(function(x){return x.id===id;});
  var input=document.getElementById('composer');
  var text=input.value.trim();
  if(!text)return;
  var nowMs = Date.now();
  var agent = getAgentName() || 'Front Desk';
  /* announce join the first time staff replies */
  var staffAlready = c.messages.some(function(m){ return m.from === 'hotel'; });
  if(!staffAlready){
    c.messages.push({from:'system',text:agent + ' has joined the chat.', at:timeNow(), atMs:nowMs});
  }
  c.messages.push({from:'hotel',text:text,at:timeNow(), atMs:nowMs, agentName:agent});
  /* response-time grade + toast */
  var staffIdx = c.messages.length - 1;
  var ms = computeResponseMs(c.messages, staffIdx);
  if(ms !== null){
    var grade = gradeFor(ms);
    recordGrade(grade, ms);
    if(grade.toast) showToast(grade, ms);
    renderScoreboard();
  }
  /* persist to Worker */
  if(WORKER_URL){
    fetch(WORKER_URL+'/conversation',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).catch(function(){});
  }
  input.value='';input.style.height='auto';
  renderThread(c);renderAI(c);
}
function goCases(){
  document.querySelectorAll('.dh-nav-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.view==='cases');});
  currentView='cases';render();
}
function openCaseFromConv(convId){
  var c=conversations.find(function(x){return x.id===convId;});
  var first=prompt("Guest first name:");if(first===null)return;
  var last=prompt("Guest last name:");if(last===null)return;
  var phone=prompt("Guest phone number:");if(phone===null)return;
  var room=prompt("Room number:",roomDisplay(c)==="—"?"":roomDisplay(c));if(room===null)return;
  var type=prompt("Case type — type 'maintenance', 'housekeeping', or 'service':","service");
  var summary=prompt("Brief description of the issue:");
  var caseObj={
    id:"CASE-"+Date.now().toString().slice(-6),
    conversationId:convId,firstName:first,lastName:last,phone:phone,room:room,
    type:(type||"service").toLowerCase(),summary:summary||"Front-desk opened case",
    status:"Open",channel:"web",createdAt:new Date().toISOString(),
    timeline:[{at:new Date().toISOString(),note:"Case opened by front desk"}]
  };
  saveCaseToWorker(caseObj);
  cases.unshift(caseObj);
  c.caseId=caseObj.id;c.status='attention';
  alert("Case "+caseObj.id+" opened.");
  goCases();
}

/* ============================================================
   CASES VIEW
   ============================================================ */
var caseFilter='all';
function renderCases(){
  var body=document.getElementById('body');
  body.innerHTML='<div class="dh-panel">'+
    '<div class="dh-panel-h"><h2>Guest Cases</h2>'+
      '<div class="dh-filter">'+
        '<button class="dh-fbtn'+(caseFilter==='all'?' active':'')+'" onclick="setCaseFilter(\'all\')">All</button>'+
        '<button class="dh-fbtn'+(caseFilter==='Open'?' active':'')+'" onclick="setCaseFilter(\'Open\')">Open</button>'+
        '<button class="dh-fbtn'+(caseFilter==='Resolved'?' active':'')+'" onclick="setCaseFilter(\'Resolved\')">Resolved</button>'+
        '<button class="dh-fbtn'+(caseFilter==='Closed'?' active':'')+'" onclick="setCaseFilter(\'Closed\')">Closed</button>'+
      '</div></div>'+
    '<div id="caseList"></div></div>';
  var list=document.getElementById('caseList');
  var shown=cases.filter(function(c){return caseFilter==='all'||c.status===caseFilter;});
  if(shown.length===0){
    list.innerHTML='<div class="dh-empty"><div class="dh-empty-icon">&#128221;</div>'+
      '<div>No cases in this category.</div></div>';return;
  }
  shown.forEach(function(c){
    var sClass=c.status==='Open'?'dh-s-open':c.status==='Resolved'?'dh-s-resolved':'dh-s-closed';
    var actions='';
    if(c.status==='Open')
      actions='<button class="dh-ca-btn dh-ca-resolve" onclick="caseAction(\''+c.id+'\',\'Resolved\')">Mark Resolved</button>';
    else if(c.status==='Resolved')
      actions='<button class="dh-ca-btn dh-ca-close" onclick="caseAction(\''+c.id+'\',\'Closed\')">'+
              'Close (guest confirmed satisfied)</button>'+
              '<button class="dh-ca-btn" onclick="caseAction(\''+c.id+'\',\'Open\')">Re-open</button>';
    else
      actions='<button class="dh-ca-btn" onclick="caseAction(\''+c.id+'\',\'Open\')">Re-open</button>';

    var div=document.createElement('div');
    div.className='dh-card';
    div.innerHTML=
      '<div class="dh-card-top"><div>'+
        '<div class="dh-case-id">'+esc(c.id)+'</div>'+
        '<div class="dh-case-guest">'+esc(c.firstName)+' '+esc(c.lastName)+'</div>'+
        '<div class="dh-case-meta">Room '+esc(c.room)+' &middot; '+esc(c.phone)+'</div>'+
      '</div><span class="dh-status '+sClass+'">'+esc(c.status)+'</span></div>'+
      '<div class="dh-case-summary">'+esc(c.summary)+'</div>'+
      '<span class="dh-case-type">'+esc(c.type)+'</span>'+
      '<div class="dh-case-actions">'+actions+'</div>';
    list.appendChild(div);
  });
}
function setCaseFilter(f){caseFilter=f;renderCases();}
function caseAction(id,newStatus){
  var c=cases.find(function(x){return x.id===id;});
  if(!c)return;
  if(newStatus==='Closed'){
    if(!confirm('Confirm the guest is satisfied and this case can be closed?'))return;
  }
  c.status=newStatus;
  c.updatedAt=new Date().toISOString();
  c.timeline=c.timeline||[];
  c.timeline.push({at:c.updatedAt,note:"Status changed to "+newStatus});
  saveCaseToWorker(c);
  /* keep maintenance log in sync */
  if(c.type==='maintenance'){
    var m=maintenance.find(function(x){return x.caseId===c.id;});
    if(m){m.status=newStatus;saveMaintToWorker(m);}
  }
  renderCases();
}
function saveCaseToWorker(c){
  if(WORKER_URL){
    fetch(WORKER_URL+"/case",{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).catch(function(){});
  }
}

/* ============================================================
   MAINTENANCE LOG VIEW
   ============================================================ */
function renderMaint(){
  var body=document.getElementById('body');
  /* rebuild maintenance list from maintenance-type cases too */
  var fromCases=cases.filter(function(c){return c.type==='maintenance';})
    .map(function(c){
      var existing=maintenance.find(function(m){return m.caseId===c.id;});
      return existing||{
        id:"MAINT-"+c.id.replace("CASE-",""),caseId:c.id,room:c.room,
        guestName:(c.firstName||"")+" "+(c.lastName||""),issue:c.summary,
        status:c.status,assignedTech:"",fixNotes:"",createdAt:c.createdAt};
    });
  /* merge any standalone maintenance entries */
  maintenance.forEach(function(m){
    if(!fromCases.find(function(x){return x.id===m.id;}))fromCases.push(m);
  });
  maintenance=fromCases;

  body.innerHTML='<div class="dh-panel">'+
    '<div class="dh-panel-h"><h2>Maintenance Log</h2>'+
      '<button class="dh-fbtn active" onclick="render()">&#8635; Refresh</button></div>'+
    (maintenance.length===0
      ?'<div class="dh-empty"><div class="dh-empty-icon">&#128295;</div>'+
       '<div>No maintenance items yet. They appear here automatically '+
       'when a maintenance-type case is opened.</div></div>'
      :'<table class="dh-mtable"><thead><tr>'+
       '<th>Log ID</th><th>Room</th><th>Guest</th><th>Issue</th>'+
       '<th>Assigned Tech</th><th>Fix Notes</th><th>Status</th>'+
       '</tr></thead><tbody id="maintBody"></tbody></table>')+
    '</div>';

  if(maintenance.length===0)return;
  var tbody=document.getElementById('maintBody');
  maintenance.forEach(function(m,idx){
    var sClass=m.status==='Open'?'dh-s-open':m.status==='Resolved'?'dh-s-resolved':'dh-s-closed';
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td style="font-family:monospace;font-size:11px">'+esc(m.id)+'</td>'+
      '<td><b>'+esc(m.room)+'</b></td>'+
      '<td>'+esc(m.guestName)+'</td>'+
      '<td>'+esc(m.issue)+'</td>'+
      '<td><input class="dh-mt-input" value="'+esc(m.assignedTech||'')+'" '+
        'placeholder="Tech name" onchange="updateMaint('+idx+',\'assignedTech\',this.value)"></td>'+
      '<td><input class="dh-mt-input" value="'+esc(m.fixNotes||'')+'" '+
        'placeholder="Notes" onchange="updateMaint('+idx+',\'fixNotes\',this.value)"></td>'+
      '<td><span class="dh-status '+sClass+'">'+esc(m.status)+'</span></td>';
    tbody.appendChild(tr);
  });
}
function updateMaint(idx,field,value){
  maintenance[idx][field]=value;
  maintenance[idx].updatedAt=new Date().toISOString();
  saveMaintToWorker(maintenance[idx]);
}
function saveMaintToWorker(m){
  if(WORKER_URL){
    fetch(WORKER_URL+"/maintenance",{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(m)}).catch(function(){});
  }
}

/* ============================================================
   SMART POLLING — adaptive refresh based on what the user is doing.

   THREE STATES:
     ACTIVE   — tab visible AND user moved/typed in last 60s   → poll every 5s
     BACKGROUND — tab hidden                                    → poll every 60s
     IDLE     — tab visible but no activity for 5+ minutes      → poll every 5min

   Why this matters: a 5-second refresh feels instant to staff,
   but a dashboard left open all day at that rate burns ~50,000
   requests/day (half the free Cloudflare quota per tab).

   With smart polling: ~80% reduction. Snappy when used, near-free when not.

   Counter-state changes happen the INSTANT activity is detected —
   so the moment staff touches the dashboard after being away, it
   immediately catches up.
   ============================================================ */

var POLL_ACTIVE    = 5000;     /* 5 seconds when actively used */
var POLL_BACKGROUND= 60000;    /* 60 seconds when tab is hidden */
var POLL_IDLE      = 300000;   /* 5 minutes when tab is visible but idle */
var IDLE_THRESHOLD = 60000;    /* 60s of no activity = idle */

var lastActivity = Date.now();
var pollTimer = null;

function currentPollState(){
  if(document.hidden) return {state:'background', interval:POLL_BACKGROUND};
  if(Date.now() - lastActivity > IDLE_THRESHOLD) return {state:'idle', interval:POLL_IDLE};
  return {state:'active', interval:POLL_ACTIVE};
}

function doRefresh(){
  if(currentView==='inbox'){
    loadData().then(function(){
      var list=document.getElementById('convList');
      if(!list)return;
      var savedActive=activeConvId;
      list.innerHTML='';
      /* honor the current view filter (active vs archived) */
      var showArchived = (currentView === 'archive');
      var filtered = conversations.filter(function(c){
        return showArchived ? isArchived(c) : !isArchived(c);
      });
      /* newest activity first */
      filtered.sort(function(a,b){ return lastActivityMs(b) - lastActivityMs(a); });
      if(filtered.length===0){
        list.innerHTML='<div class="dh-empty">'+
          (showArchived ? 'No archived conversations.' : 'No conversations yet.')+
          '</div>';
        return;
      }
      filtered.forEach(function(c){
        var last=c.messages[c.messages.length-1];
        var div=document.createElement('div');
        div.className='dh-conv'+(c.id===savedActive?' active':'');
        div.setAttribute('data-conv-id', c.id);
        div.onclick=function(){openConv(c.id);};
        div.innerHTML=
          '<div class="dh-conv-top"><span class="dh-conv-name">'+esc(guestDisplay(c))+'</span>'+
            '<span class="dh-conv-time">'+esc(timeDisplay(c))+'</span></div>'+
          '<div class="dh-conv-prev">Room '+esc(roomDisplay(c))+' &middot; '+esc(last?last.text:'')+'</div>'+
          '<div style="margin-top:6px">' + badgeHtml(c) + '</div>';
        list.appendChild(div);
      });
      /* if the OPEN conversation got new messages, append seamlessly */
      if(savedActive){
        var c=conversations.find(function(x){return x.id===savedActive;});
        var threadEl=document.getElementById('thread');
        if(c && threadEl){
          var renderedCount=threadEl.querySelectorAll('.dh-bub').length;
          if(c.messages.length>renderedCount){
            renderThread(c);
            renderAI(c);
          }
        }
      }
    });
  } else if(currentView==='cases' || currentView==='maint'){
    render();
  }
}

function scheduleNextPoll(){
  if(pollTimer) clearTimeout(pollTimer);
  var s = currentPollState();
  /* update the indicator badge if present */
  updatePollIndicator(s.state);
  pollTimer = setTimeout(function(){
    doRefresh();
    scheduleNextPoll();
  }, s.interval);
}

/* ---- activity detection — any input snaps us back to active mode ---- */
function bumpActivity(){
  var wasIdleOrBg = (Date.now() - lastActivity > IDLE_THRESHOLD) || document.hidden;
  lastActivity = Date.now();
  /* if we just came out of idle/background, refresh immediately */
  if(wasIdleOrBg){
    doRefresh();
    scheduleNextPoll();
  }
}
['mousemove','keydown','click','scroll','touchstart'].forEach(function(ev){
  document.addEventListener(ev, bumpActivity, {passive:true});
});

/* ---- tab visibility — refresh immediately when tab returns to foreground ---- */
document.addEventListener('visibilitychange', function(){
  if(!document.hidden){
    /* tab just became visible — refresh now and resume active polling */
    lastActivity = Date.now();
    doRefresh();
  }
  scheduleNextPoll();
});

/* ---- optional small indicator showing current poll state ---- */
function updatePollIndicator(state){
  var el = document.getElementById('pollIndicator');
  if(!el){
    el = document.createElement('div');
    el.id = 'pollIndicator';
    el.style.cssText = 'position:fixed;bottom:8px;right:10px;font-size:10px;'+
      'color:#9aa3b0;background:rgba(255,255,255,0.9);padding:3px 8px;'+
      'border-radius:10px;border:1px solid #e2e0d8;font-family:inherit;'+
      'pointer-events:none;z-index:100;letter-spacing:.04em';
    document.body.appendChild(el);
  }
  var labels = {active:'● live', background:'○ paused (tab hidden)', idle:'○ idle'};
  var colors = {active:'#2d6a4f', background:'#9aa3b0', idle:'#b7791f'};
  el.textContent = labels[state] || '';
  el.style.color = colors[state] || '#9aa3b0';
}


/* Live status badge ticker — refreshes badges every second without re-rendering whole list */
setInterval(function(){
  if(currentView !== 'inbox' && currentView !== 'archive') return;
  document.querySelectorAll('.dh-conv').forEach(function(el){
    var id = el.getAttribute('data-conv-id');
    if(!id) return;
    var c = conversations.find(function(x){return x.id===id;});
    if(!c) return;
    var badgeWrap = el.querySelector('.dh-status-badge');
    if(badgeWrap){
      var temp = document.createElement('div');
      temp.innerHTML = badgeHtml(c);
      badgeWrap.parentNode.replaceChild(temp.firstChild, badgeWrap);
    }
  });
  /* also update open conversation header badge */
  if(activeConvId){
    var c2 = conversations.find(function(x){return x.id===activeConvId;});
    if(c2){
      var headBadge = document.querySelector('.dh-view-h .dh-status-badge');
      if(headBadge){
        var temp = document.createElement('div');
        temp.innerHTML = badgeHtml(c2);
        headBadge.parentNode.replaceChild(temp.firstChild, headBadge);
      }
    }
  }
}, 1000);

/* ============================================================
   INIT
   ============================================================ */
updateAgentTag();
if(!loadAgent()){
  promptAgentName().then(function(){ render(); scheduleNextPoll(); });
} else {
  render();
  scheduleNextPoll();
}
</script>
