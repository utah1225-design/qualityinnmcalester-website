<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Front Desk — Quality Inn &amp; Suites McAlester on Hwy 69</title>
<style>
/* ════════════════════════════════════════════════════════════════
   DESIGN TOKENS — change once, propagate everywhere
   ════════════════════════════════════════════════════════════════ */
:root {
  /* Color — calm, muted, hotel-professional */
  --ink:        #1a2233;   /* primary text, deep ink */
  --ink-soft:   #4a5468;   /* secondary text */
  --ink-mute:   #8a93a6;   /* tertiary / hints */
  --line:       #e7e3da;   /* borders, dividers */
  --line-soft:  #f0ece2;   /* subtle separators */
  --paper:      #faf8f3;   /* page background, warm cream */
  --paper-card: #ffffff;   /* card / panel background */
  --brand:      #0f1f3d;   /* navy — for primary actions, topbar */
  --brand-soft: #243454;   /* slightly lighter navy */
  --accent:     #b88947;   /* muted gold (calmer than #c9964a) */
  --accent-soft:#d4ad6f;
  --good:       #2d6a4f;
  --good-soft:  #e8f1ec;
  --warn:       #b7791f;
  --warn-soft:  #fbeed7;
  --alert:      #b03a3a;
  --alert-soft: #f6e3e0;
  --neutral:    #6b7280;
  --neutral-soft:#eef0f3;

  /* Spacing scale */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-8: 32px; --s-10: 40px;

  /* Type ramp */
  --t-xs: 11px; --t-sm: 12px; --t-md: 13px; --t-lg: 15px;
  --t-xl: 18px; --t-2xl: 22px; --t-3xl: 28px;

  /* Radius */
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-pill: 999px;

  /* Shadows — soft, professional */
  --shadow-sm: 0 1px 2px rgba(15,31,61,0.04);
  --shadow-md: 0 2px 8px rgba(15,31,61,0.06);
  --shadow-lg: 0 8px 28px rgba(15,31,61,0.10);
}

/* ════════════════════════════════════════════════════════════════
   BASE
   ════════════════════════════════════════════════════════════════ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: var(--t-md);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3 {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }
.dh-empty { padding: var(--s-6); text-align: center; color: var(--ink-mute); font-size: var(--t-sm); }

/* ════════════════════════════════════════════════════════════════
   TOP BAR
   ════════════════════════════════════════════════════════════════ */
.dh-top {
  background: var(--brand);
  color: #fff;
  padding: var(--s-3) var(--s-6);
  display: flex; align-items: center; gap: var(--s-4);
  box-shadow: var(--shadow-md);
  position: relative; z-index: 10;
}
.dh-logo { font-size: 22px; opacity: 0.9; }
.dh-title h1 {
  font-size: var(--t-lg);
  color: #fff;
  font-weight: 600;
}
.dh-title p {
  font-size: var(--t-xs);
  color: rgba(255,255,255,0.6);
  margin: 2px 0 0;
  letter-spacing: 0.02em;
}
.dh-agent-tag {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-pill);
  padding: 6px var(--s-3);
  font-size: var(--t-xs);
  font-weight: 500;
  margin-left: auto;
  transition: all 0.15s;
}
.dh-agent-tag:hover {
  background: rgba(255,255,255,0.14);
  color: #fff;
  border-color: rgba(255,255,255,0.2);
}
.dh-nav {
  display: flex; gap: var(--s-1);
  margin-left: var(--s-3);
}
.dh-nav-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.65);
  padding: 8px var(--s-3);
  font-size: var(--t-sm);
  font-weight: 500;
  border-radius: var(--r-sm);
  transition: all 0.15s;
}
.dh-nav-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
.dh-nav-btn.active { background: rgba(255,255,255,0.12); color: #fff; }

/* ════════════════════════════════════════════════════════════════
   MAIN LAYOUT — list | thread | guest panel (right rail, collapsible)
   ════════════════════════════════════════════════════════════════ */
.dh-body {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 62px);
  background: var(--paper);
  overflow: hidden;
}

/* When a conversation is open AND guest panel expanded → 3 columns */
.dh-body.with-panel {
  grid-template-columns: 320px 1fr 300px;
}

/* LIST RAIL */
.dh-list {
  background: var(--paper-card);
  border-right: 1px solid var(--line);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.dh-list-h {
  padding: var(--s-4) var(--s-5);
  font-size: var(--t-xs);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  border-bottom: 1px solid var(--line-soft);
  background: var(--paper-card);
  position: sticky; top: 0; z-index: 1;
}
.dh-conv {
  padding: var(--s-4) var(--s-5);
  border-bottom: 1px solid var(--line-soft);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.dh-conv:hover { background: var(--paper); }
.dh-conv.active {
  background: var(--paper);
  border-left: 3px solid var(--accent);
  padding-left: calc(var(--s-5) - 3px);
}
.dh-conv-top {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 4px;
}
.dh-conv-name {
  font-weight: 600;
  font-size: var(--t-md);
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 170px;
}
.dh-conv-time {
  font-size: var(--t-xs);
  color: var(--ink-mute);
  flex-shrink: 0; margin-left: var(--s-2);
}
.dh-conv-prev {
  font-size: var(--t-sm);
  color: var(--ink-soft);
  margin-bottom: var(--s-2);
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* STATUS BADGES — refined */
.dh-status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap;
}
.dh-sb-replied      { background: var(--good-soft);    color: var(--good); }
.dh-sb-ai           { background: var(--neutral-soft); color: var(--neutral); }
.dh-sb-waiting-low  { background: #fcf4d6; color: #8a6a14; }
.dh-sb-waiting-mid  { background: var(--warn-soft);    color: var(--warn); }
.dh-sb-waiting-high { background: var(--alert-soft);   color: var(--alert); animation: pulseRed 1.8s infinite; }
@keyframes pulseRed { 0%,100% { opacity: 1 } 50% { opacity: 0.5 } }
.dh-sb-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}
.dh-sb-replied .dh-sb-dot      { background: var(--good); }
.dh-sb-ai .dh-sb-dot           { background: var(--neutral); }
.dh-sb-waiting-low .dh-sb-dot  { background: #d4a514; }
.dh-sb-waiting-mid .dh-sb-dot  { background: var(--warn); }
.dh-sb-waiting-high .dh-sb-dot { background: var(--alert); }

/* CONVERSATION VIEW (middle column) */
.dh-view {
  background: var(--paper);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.dh-view-h {
  background: var(--paper-card);
  border-bottom: 1px solid var(--line);
  padding: var(--s-4) var(--s-6);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: var(--s-4);
}
.dh-view-h h2 {
  font-size: var(--t-xl);
  color: var(--ink);
  font-weight: 600;
}
.dh-view-h p {
  font-size: var(--t-sm);
  color: var(--ink-soft);
  margin: 4px 0 0;
  display: flex; align-items: center; gap: var(--s-2);
}

/* Header actions cluster */
.dh-view-actions { display: flex; gap: var(--s-2); align-items: center; }

/* Buttons — unified */
.dh-btn {
  background: var(--paper-card);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 8px var(--s-4);
  font-size: var(--t-sm);
  font-weight: 600;
  transition: all 0.15s;
  white-space: nowrap;
}
.dh-btn:hover { background: var(--paper); border-color: var(--ink-mute); }

.dh-btn-primary {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.dh-btn-primary:hover { background: var(--brand-soft); border-color: var(--brand-soft); }

.dh-btn-accent {
  background: var(--accent);
  color: var(--brand);
  border-color: var(--accent);
}
.dh-btn-accent:hover { background: var(--accent-soft); border-color: var(--accent-soft); }

.dh-btn-good {
  background: var(--good);
  color: #fff;
  border-color: var(--good);
}
.dh-btn-good:hover { opacity: 0.92; }

.dh-btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ink-soft);
}
.dh-btn-ghost:hover { background: var(--neutral-soft); color: var(--ink); }

/* Legacy compatibility — map old btn classes to new */
.dh-btn-case { background: var(--accent); color: var(--brand); border-color: var(--accent); }
.dh-btn-case:hover { background: var(--accent-soft); border-color: var(--accent-soft); }

/* Take Over button */
.dh-takeover-btn {
  background: var(--accent);
  color: var(--brand);
  border: 1px solid var(--accent);
  border-radius: var(--r-pill);
  padding: 7px var(--s-4);
  font-size: var(--t-xs);
  font-weight: 700;
  letter-spacing: 0.02em;
  transition: all 0.15s;
}
.dh-takeover-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
.dh-takeover-btn.active { background: var(--good); color: #fff; border-color: var(--good); }
.dh-takeover-btn.active:hover { opacity: 0.92; }

/* Toggle for guest panel */
.dh-toggle-panel {
  background: transparent;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 6px 10px;
  font-size: var(--t-xs);
  color: var(--ink-soft);
}
.dh-toggle-panel:hover { background: var(--neutral-soft); }

/* ════════════════════════════════════════════════════════════════
   THREAD (middle column body)
   ════════════════════════════════════════════════════════════════ */
.dh-thread {
  flex: 1; overflow-y: auto;
  padding: var(--s-6) var(--s-6) var(--s-3);
  display: flex; flex-direction: column; gap: var(--s-3);
}
.dh-bub {
  max-width: 70%;
  padding: 10px var(--s-4);
  border-radius: var(--r-md);
  font-size: var(--t-md);
  line-height: 1.5;
  word-wrap: break-word;
  box-shadow: var(--shadow-sm);
}
.dh-bub-guest {
  background: var(--paper-card);
  border: 1px solid var(--line);
  align-self: flex-start;
  border-top-left-radius: 3px;
}
.dh-bub-ai {
  background: var(--neutral-soft);
  color: var(--ink);
  align-self: flex-start;
  border-top-left-radius: 3px;
}
.dh-bub-hotel {
  background: var(--brand);
  color: #fff;
  align-self: flex-end;
  border-top-right-radius: 3px;
}
.dh-bub-hotel a { color: var(--accent-soft); }
.dh-bub-system {
  background: transparent;
  color: var(--ink-mute);
  font-size: var(--t-xs);
  font-style: italic;
  align-self: center;
  padding: 4px var(--s-3);
  text-align: center;
  max-width: 100%;
}
.dh-bub-l {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.7;
  margin-bottom: 4px;
}
.dh-bub-t {
  font-size: 10px;
  opacity: 0.55;
  margin-top: 4px;
}
.dh-bub-t.fast { color: var(--good); opacity: 0.95; font-weight: 600; }
.dh-bub-t.slow { color: var(--warn); opacity: 0.95; font-weight: 600; }
.dh-bub-t.late { color: var(--alert); opacity: 0.95; font-weight: 600; }

/* AI suggestion panel */
.dh-ai-panel {
  padding: 0 var(--s-6) var(--s-3);
  flex-shrink: 0;
}
.dh-ai-head {
  font-size: var(--t-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-mute);
  margin-bottom: var(--s-2);
}
.dh-ai-chips { display: flex; flex-wrap: wrap; gap: var(--s-2); }
.dh-ai-chip {
  background: var(--paper-card);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 7px var(--s-3);
  border-radius: var(--r-pill);
  font-size: var(--t-sm);
  transition: all 0.15s;
  cursor: pointer;
}
.dh-ai-chip:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

/* Composer */
.dh-composer {
  padding: var(--s-4) var(--s-6) var(--s-5);
  background: var(--paper-card);
  border-top: 1px solid var(--line);
  display: flex; gap: var(--s-3); align-items: flex-end;
  flex-shrink: 0;
}
.dh-input {
  flex: 1;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 10px var(--s-4);
  font-size: var(--t-md);
  outline: none;
  resize: none;
  min-height: 40px; max-height: 100px;
  transition: border-color 0.15s;
  background: var(--paper);
}
.dh-input:focus { border-color: var(--accent); background: var(--paper-card); }
.dh-send {
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  width: 44px; height: 40px;
  font-size: var(--t-lg);
  transition: background 0.15s;
}
.dh-send:hover { background: var(--brand-soft); }

/* Empty state */
.dh-empty-main {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: var(--s-8);
  color: var(--ink-mute);
}
.dh-empty-icon { font-size: 38px; opacity: 0.35; margin-bottom: var(--s-4); }
.dh-empty-main h3 {
  font-size: var(--t-xl);
  color: var(--ink-soft);
  font-weight: 500;
  margin-bottom: var(--s-2);
}

/* ════════════════════════════════════════════════════════════════
   GUEST PANEL — right rail, collapsible
   ════════════════════════════════════════════════════════════════ */
.dh-guest-panel {
  background: var(--paper-card);
  border-left: 1px solid var(--line);
  padding: var(--s-5) var(--s-5);
  overflow-y: auto;
  display: flex; flex-direction: column; gap: var(--s-3);
}
.dh-gp-header {
  font-size: var(--t-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-mute);
  margin-bottom: var(--s-2);
  padding-bottom: var(--s-3);
  border-bottom: 1px solid var(--line-soft);
}
.dh-gp-field {
  display: flex; flex-direction: column; gap: 4px;
}
.dh-gp-field label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.dh-gp-input {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 8px var(--s-3);
  font-size: var(--t-sm);
  outline: none;
  background: var(--paper);
  transition: all 0.15s;
}
.dh-gp-input:focus { border-color: var(--accent); background: var(--paper-card); }
/* widths neutralized in sidebar — let them flex */
.dh-gp-w-name, .dh-gp-w-room, .dh-gp-w-phone, .dh-gp-w-date {
  width: 100%;
}
.dh-gp-actions {
  display: flex; gap: var(--s-2); margin-top: var(--s-3);
}
.dh-gp-save {
  background: var(--good); color: #fff; border: none;
  border-radius: var(--r-sm); padding: 9px var(--s-4);
  font-size: var(--t-sm); font-weight: 600;
  flex: 1;
}
.dh-gp-save:hover { opacity: 0.92; }
.dh-gp-archive {
  background: var(--paper-card); color: var(--ink-soft);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  padding: 9px var(--s-4); font-size: var(--t-sm); font-weight: 600;
}
.dh-gp-archive:hover { border-color: var(--alert); color: var(--alert); }
.dh-gp-saved {
  color: var(--good); font-size: var(--t-xs); font-weight: 600;
  margin-top: var(--s-2); display: none;
}

/* ════════════════════════════════════════════════════════════════
   SCOREBOARD
   ════════════════════════════════════════════════════════════════ */
.dh-scoreboard {
  background: var(--paper-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--s-5) var(--s-6);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: var(--s-5);
  box-shadow: var(--shadow-sm);
  width: 100%;
}
.dh-sb-block {
  display: flex; flex-direction: column;
}
.dh-sb-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.dh-sb-value {
  font-size: var(--t-3xl);
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.05;
  margin-top: 4px;
}
.dh-sb-detail {
  font-size: var(--t-xs);
  color: var(--ink-mute);
  margin-top: 4px;
}
.dh-sb-grade {
  font-size: var(--t-xs);
  font-weight: 700;
  padding: 4px var(--s-3);
  border-radius: var(--r-pill);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  display: inline-block;
  margin-top: var(--s-2);
}
.dh-sb-g-excellent { background: var(--good-soft);    color: var(--good); }
.dh-sb-g-good      { background: var(--neutral-soft); color: var(--ink-soft); }
.dh-sb-g-slow      { background: var(--warn-soft);    color: var(--warn); }

/* ════════════════════════════════════════════════════════════════
   AGENT MODAL (sign-in)
   ════════════════════════════════════════════════════════════════ */
.dh-modal-bg {
  position: fixed; inset: 0;
  background: rgba(15,31,61,0.45);
  backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.dh-modal {
  background: var(--paper-card);
  border-radius: var(--r-lg);
  padding: var(--s-6) var(--s-6) var(--s-5);
  width: 360px; max-width: 92%;
  box-shadow: var(--shadow-lg);
}
.dh-modal h3 {
  font-size: var(--t-xl);
  margin-bottom: var(--s-2);
}
.dh-modal p {
  font-size: var(--t-sm);
  color: var(--ink-soft);
  margin: 0 0 var(--s-4);
}
.dh-modal input {
  width: 100%;
  padding: 11px var(--s-4);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  font-size: var(--t-md);
  outline: none;
  margin-bottom: var(--s-3);
  transition: border-color 0.15s;
}
.dh-modal input:focus { border-color: var(--accent); }
.dh-modal-btn {
  width: 100%;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 11px;
  font-size: var(--t-md);
  font-weight: 600;
  transition: background 0.15s;
}
.dh-modal-btn:hover { background: var(--brand-soft); }

/* ════════════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ════════════════════════════════════════════════════════════════ */
.dh-toast-wrap {
  position: fixed; top: 78px; right: var(--s-5);
  display: flex; flex-direction: column; gap: var(--s-3);
  z-index: 900; pointer-events: none;
}
.dh-toast {
  background: var(--paper-card);
  border-left: 3px solid var(--accent);
  border-radius: var(--r-md);
  padding: var(--s-3) var(--s-5);
  box-shadow: var(--shadow-lg);
  min-width: 260px; max-width: 360px;
  pointer-events: auto;
  animation: toastIn 0.25s ease;
}
.dh-toast.lightning { border-left-color: var(--accent); }
.dh-toast.excellent { border-left-color: var(--good); }
.dh-toast.slow      { border-left-color: var(--warn); }
.dh-toast.late      { border-left-color: var(--alert); }
.dh-toast-title { font-weight: 700; font-size: var(--t-md); margin-bottom: 2px; }

<script>
/* ============================================================
   QUALITY INN McALESTER — FRONT DESK CONSOLE
   Inbox + Cases + Maintenance Log
   Set WORKER_URL to your deployed Cloudflare Worker.
   ============================================================ */
var WORKER_URL = "https://qi-concierge.utah1225.workers.dev";

/* ============================================================
   AGENT MANAGEMENT — who is at the front desk right now
   Persists in window memory for 12 hours.
   ============================================================ */
var AGENT_SHIFT_HOURS = 12;
function loadAgent(){
  var raw = window.__qiAgent;
  if(!raw) return null;
  if(Date.now() - raw.signedInAt > AGENT_SHIFT_HOURS*3600*1000) return null;
  return raw;
}
function saveAgent(name){
  window.__qiAgent = {name:name, signedInAt:Date.now()};
  updateAgentTag();
}
function clearAgent(){ window.__qiAgent = null; updateAgentTag(); }
function getAgentName(){ var a = loadAgent(); return a ? a.name : null; }
function updateAgentTag(){
  var tag = document.getElementById('agentTag');
  if(!tag) return;
  var a = loadAgent();
  tag.innerHTML = a ? '&#128100; ' + esc(a.name) : '&#128100; Not signed in';
}
function promptAgentName(reason){
  return new Promise(function(resolve){
    var bg = document.createElement('div');
    bg.className = 'dh-modal-bg';
    bg.innerHTML = '<div class="dh-modal">' +
      '<h3>Sign in to the front desk</h3>' +
      '<p>' + (reason || 'Your name will be shown to guests when you join their chat.') + '</p>' +
      '<input id="agentNameInput" placeholder="First name" autofocus>' +
      '<button class="dh-modal-btn" id="agentNameBtn">Start shift</button></div>';
    document.body.appendChild(bg);
    var input = document.getElementById('agentNameInput');
    var btn = document.getElementById('agentNameBtn');
    function submit(){
      var n = input.value.trim();
      if(!n){ input.focus(); return; }
      saveAgent(n);
      bg.remove();
      resolve(n);
    }
    btn.onclick = submit;
    input.addEventListener('keydown', function(e){ if(e.key === 'Enter') submit(); });
    setTimeout(function(){ input.focus(); }, 60);
  });
}
function changeAgent(){
  clearAgent();
  promptAgentName('Signing in a different agent.');
}

/* ============================================================
   RESPONSE-TIME GRADING + TOASTS + SCOREBOARD
   ============================================================ */
var GRADE_TIERS = [
  {max: 60000, key:'lightning', label:'&#9889; Lightning', toast:true,
   praise:['Incredible &mdash; under a minute!','Lightning fast!','That is a {sec}-second reply &mdash; wow!']},
  {max: 180000, key:'excellent', label:'&#10003; Excellent', toast:true,
   praise:['Nice work &mdash; {min}-minute reply.','Great &mdash; under 3 minutes!','Excellent response time, {min} min.']},
  {max: 600000, key:'good', label:'Good', toast:false, praise:['']},
  {max: 1200000, key:'slow', label:'Slow', toast:true,
   nudge:['{min}-min reply &mdash; try to get under 10 next time.','A bit slow at {min} min &mdash; aim for under 10.']},
  {max: Infinity, key:'late', label:'Late', toast:true,
   nudge:['{min}-min response &mdash; this guest waited a long time.','Late reply ({min} min). Please prioritize chat next time.']}
];
function gradeFor(ms){
  for(var i=0;i<GRADE_TIERS.length;i++){ if(ms <= GRADE_TIERS[i].max) return GRADE_TIERS[i]; }
  return GRADE_TIERS[GRADE_TIERS.length-1];
}
function showToast(grade, ms){
  var sec = Math.round(ms/1000);
  var min = Math.max(1, Math.round(ms/60000));
  var pool = grade.praise || grade.nudge || [''];
  var msg = pool[Math.floor(Math.random()*pool.length)]
              .replace('{sec}', sec).replace('{min}', min);
  var wrap = document.getElementById('toastWrap');
  if(!wrap) return;
  var t = document.createElement('div');
  t.className = 'dh-toast ' + grade.key;
  t.innerHTML = '<div class="dh-toast-title">' + grade.label + '</div>' +
                '<div class="dh-toast-msg">' + esc(msg) + '</div>';
  wrap.appendChild(t);
  setTimeout(function(){
    t.style.transition = 'opacity .3s';
    t.style.opacity = '0';
    setTimeout(function(){ t.remove(); }, 350);
  }, 4500);
}
function recordGrade(grade, ms){
  if(!window.__qiGrades) window.__qiGrades = {date:new Date().toDateString(), entries:[]};
  if(window.__qiGrades.date !== new Date().toDateString()){
    window.__qiGrades = {date:new Date().toDateString(), entries:[]};
  }
  window.__qiGrades.entries.push({grade:grade.key, ms:ms, at:Date.now()});
}
function todaysStats(){
  var g = window.__qiGrades;
  if(!g || g.date !== new Date().toDateString() || g.entries.length === 0)
    return {count:0, avg:0, fastCount:0, slowCount:0, lateCount:0};
  var total = 0, fast = 0, slow = 0, late = 0;
  g.entries.forEach(function(e){
    total += e.ms;
    if(e.grade === 'lightning' || e.grade === 'excellent') fast++;
    if(e.grade === 'slow') slow++;
    if(e.grade === 'late') late++;
  });
  return {count:g.entries.length, avg:total/g.entries.length,
          fastCount:fast, slowCount:slow, lateCount:late};
}
function overallGrade(stats){
  if(stats.count === 0) return {label:'No data', cls:'dh-sb-g-good'};
  if(stats.avg <= 180000 && stats.lateCount === 0) return {label:'Excellent', cls:'dh-sb-g-excellent'};
  if(stats.avg <= 600000 && stats.lateCount <= 1) return {label:'Good', cls:'dh-sb-g-good'};
  return {label:'Needs Speed', cls:'dh-sb-g-slow'};
}
function computeResponseMs(messages, staffIdx){
  for(var i = staffIdx - 1; i >= 0; i--){
    if(messages[i].from === 'guest'){
      var gT = messages[i].atMs || Date.parse(messages[i].at) || null;
      var sT = messages[staffIdx].atMs || Date.parse(messages[staffIdx].at) || null;
      if(gT && sT) return sT - gT;
    }
  }
  return null;
}
function renderScoreboard(){
  var slot = document.getElementById('scoreboardSlot');
  if(!slot) return;
  var stats = todaysStats();
  var grade = overallGrade(stats);
  var avgText = stats.count === 0 ? '&mdash;' : (function(ms){
    var s = Math.round(ms/1000); if(s<60) return s+'s'; return Math.round(s/60)+'m';
  })(stats.avg);
  slot.innerHTML =
    '<div class="dh-scoreboard">' +
      '<div class="dh-sb-block"><div class="dh-sb-label">Replies Today</div>' +
        '<div class="dh-sb-value">' + stats.count + '</div></div>' +
      '<div class="dh-sb-block"><div class="dh-sb-label">Avg Response</div>' +
        '<div class="dh-sb-value">' + avgText + '</div></div>' +
      '<div class="dh-sb-block"><div class="dh-sb-label">Fast Replies</div>' +
        '<div class="dh-sb-value">' + stats.fastCount + '</div>' +
        '<div class="dh-sb-detail">under 3 min</div></div>' +
      '<div class="dh-sb-block"><div class="dh-sb-label">Slow / Late</div>' +
        '<div class="dh-sb-value">' + (stats.slowCount + stats.lateCount) + '</div>' +
        '<div class="dh-sb-detail">10+ min</div></div>' +
      '<div class="dh-sb-block" style="text-align:right"><div class="dh-sb-label">Shift Grade</div>' +
        '<div style="margin-top:6px"><span class="dh-sb-grade ' + grade.cls + '">' + grade.label + '</span></div></div>' +
    '</div>';
}
   /* e.g. https://qi-concierge.yourname.workers.dev */

function linkify(s){return s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');}
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function timeNow(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

/* ---- robust display helpers — work for live AND demo conversation shapes ---- */
function guestDisplay(c){
  if(!c) return 'Guest';
  /* prefer guestInfo (set via intro card or staff edit) */
  if(c.guestInfo){
    var n = ((c.guestInfo.firstName||'') + ' ' + (c.guestInfo.lastName||'')).trim();
    if(n) return n;
  }
  if(c.guest && typeof c.guest === 'object'){
    var n2 = ((c.guest.firstName||'') + ' ' + (c.guest.lastName||'')).trim();
    return n2 || 'Web Guest';
  }
  if(typeof c.guest === 'string' && c.guest) return c.guest;
  return 'Web Guest';
}
function roomDisplay(c){
  if(!c) return '—';
  if(c.guestInfo && c.guestInfo.room) return c.guestInfo.room;
  if(c.room) return c.room;
  if(c.guest && typeof c.guest === 'object' && c.guest.room) return c.guest.room;
  return '—';
}
function timeDisplay(c){
  if(!c) return '';
  if(c.time) return c.time;
  if(c.startedAt){
    try{ return new Date(c.startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
    catch(e){ return ''; }
  }
  if(c.updatedAt){
    try{ return new Date(c.updatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
    catch(e){ return ''; }
  }
  return '';
}

/* ── v3 helpers: status badges, archive logic, guest details panel ── */

function lastGuestMsgAt(c){
  if(!c || !c.messages) return null;
  for(var i=c.messages.length-1;i>=0;i--){
    var m=c.messages[i];
    if(m.from==='guest'){ return m.atMs || Date.parse(m.at) || null; }
  }
  return null;
}
function lastStaffMsgAt(c){
  if(!c || !c.messages) return null;
  for(var i=c.messages.length-1;i>=0;i--){
    var m=c.messages[i];
    if(m.from==='hotel'){ return m.atMs || Date.parse(m.at) || null; }
  }
  return null;
}

/* Most recent activity timestamp for sorting — falls back through possible fields */
function lastActivityMs(c){
  if(!c) return 0;
  if(c.messages && c.messages.length){
    var last = c.messages[c.messages.length-1];
    var t = last.atMs || Date.parse(last.at);
    if(t && !isNaN(t)) return t;
  }
  if(c.updatedAt){
    var u = Date.parse(c.updatedAt);
    if(u && !isNaN(u)) return u;
  }
  if(c.startedAt){
    var s = Date.parse(c.startedAt);
    if(s && !isNaN(s)) return s;
  }
  if(c.archivedAt){
    var a = Date.parse(c.archivedAt);
    if(a && !isNaN(a)) return a;
  }
  return 0;
}

function formatDur(ms){
  var s = Math.round(ms/1000);
  if(s<60) return s+'s';
  return Math.round(s/60)+'m';
}
function conversationStatus(c){
  if(!c) return {state:'ai', label:'AI handling', waitMs:0};
  var lastGuest = lastGuestMsgAt(c);
  var lastStaff = lastStaffMsgAt(c);
  if(!lastGuest) return {state:'ai', label:'AI handling', waitMs:0};
  if(lastStaff && lastStaff > lastGuest){
    var since = Date.now() - lastStaff;
    return {state:'replied', label:'Replied ' + formatDur(since) + ' ago', waitMs:since};
  }
  var wait = Date.now() - lastGuest;
  var min = Math.max(1, Math.round(wait/60000));
  if(wait < 5*60*1000) return {state:'wait-low', label: min + ' min waiting', waitMs:wait};
  if(wait < 10*60*1000) return {state:'wait-mid', label: min + ' min waiting', waitMs:wait};
  return {state:'wait-high', label: min + ' min waiting', waitMs:wait};
}
function badgeHtml(c){
  var s = conversationStatus(c);
  var cls = s.state==='replied'   ? 'dh-sb-replied'
          : s.state==='ai'        ? 'dh-sb-ai'
          : s.state==='wait-low'  ? 'dh-sb-waiting-low'
          : s.state==='wait-mid'  ? 'dh-sb-waiting-mid'
          : 'dh-sb-waiting-high';
  var icon = (s.state.indexOf('wait')===0) ? '&#9201;'
           : s.state==='replied' ? '&#10003;' : '&#129302;';

/* archive logic */
function isArchived(c){ return c && c.archived === true; }
function shouldAutoArchive(c){
  if(!c || isArchived(c)) return false;
  var info = c.guestInfo || {};
  if(info.departureDate){
    var dep = new Date(info.departureDate + 'T23:59:59');
    if(!isNaN(dep) && Date.now() > dep.getTime()) return 'departure';
  }
  if(new Date().getDay() === 0){
    var lastT = lastGuestMsgAt(c) || lastStaffMsgAt(c) || 0;
    if(lastT && (Date.now() - lastT) > 7*24*3600*1000) return 'sunday-sweep';
  }
  return false;
}
function runArchiveSweep(){
  if(!conversations || !conversations.forEach) return;
  conversations.forEach(function(c){
    var why = shouldAutoArchive(c);
    if(why){
      c.archived = true;
      c.archivedAt = new Date().toISOString();
      c.archivedReason = why;
      if(WORKER_URL){
        fetch(WORKER_URL+'/conversation',{method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(c)}).catch(function(){});
      }
    }
  });
}
function archiveConversation(id){
  var c = conversations.find(function(x){return x.id===id;});
  if(!c) return;
  if(!confirm('Archive this conversation? You can restore it from the Archive tab.')) return;
  c.archived = true;
  c.archivedAt = new Date().toISOString();
  c.archivedReason = 'manual';
  if(WORKER_URL){
    fetch(WORKER_URL+'/conversation',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(c)}).catch(function(){});
  }
  activeConvId = null;
  renderInbox();
}
function restoreConversation(id){
  var c = conversations.find(function(x){return x.id===id;});
  if(!c) return;
  c.archived = false;
  c.archivedAt = null;
  if(WORKER_URL){
    fetch(WORKER_URL+'/conversation',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(c)}).catch(function(){});
  }
  renderInbox();
}

    list.innerHTML='<div class="dh-empty">'+ (showArchived ? 'No archived conversations.' : 'No conversations yet.') +'</div>';
    return;

function renderAI(c){
  var panel=document.getElementById('aiPanel');

  for(var i=c.messages.length-1;i>=0;i--){
    if(c.messages[i].from==='guest'){lastGuest=c.messages[i].text;break;}
  }
  if(!lastGuest){panel.innerHTML='';return;}
  panel.innerHTML='<div class="dh-ai-head">&#129302; AI Smart Replies</div>'+
    '<div class="dh-ai-chips" id="aiChips"><span style="font-size:11px;color:#718096">Loading...</span></div>';
  getSuggestions(lastGuest).then(function(sugg){
    var chips=document.getElementById('aiChips');
    if(!chips)return;
    chips.innerHTML='';
    sugg.forEach(function(s){
      var b=document.createElement('button');
      b.className='dh-ai-chip';b.textContent=s;
      b.onclick=function(){var ci=document.getElementById('composer');
        if(ci){ci.value=s;ci.focus();}};
      chips.appendChild(b);
    });
  });

function getSuggestions(msg){
  if(WORKER_URL){
    return fetch(WORKER_URL+"/suggest",{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({guestMessage:msg})})
      .then(function(r){return r.json();})
      .then(function(d){return d.suggestions||[];})
      .catch(function(){return localSugg(msg);});
  }
  return Promise.resolve(localSugg(msg));
}
function localSugg(msg){
  var t=msg.toLowerCase();
  if(/ac|noise|loud|broken|not work|leak/.test(t))
    return["So sorry about that! I'm sending our maintenance team to your room right away.",
           "Apologies for the trouble — someone will be up within a few minutes to take a look.",
           "Thanks for letting us know. We'll get that fixed for you right away."];
  if(/breakfast/.test(t))
    return["Breakfast is served 6:00-9:00 AM daily — free hot breakfast included with your stay!",
           "Good morning! Hot breakfast runs 6-9 AM right off the lobby.",
           "We serve free hot breakfast 6-9 AM every day. Enjoy!"];
  if(/towel|clean|housekeep/.test(t))
    return["Of course — I'll have housekeeping bring those right up to your room.",
           "Happy to help! Fresh towels are on the way now.",
           "Thanks for letting us know — housekeeping will be up shortly."];
  return["Thank you for reaching out — happy to help with that!",
         "Thanks for your message! Let me take care of that for you.",
         "Happy to help — give me just a moment."];
}
function sendReply(id){
  var c=conversations.find(function(x){return x.id===id;});
  var input=document.getElementById('composer');
  var text=input.value.trim();
  if(!text)return;
  var nowMs = Date.now();
  var agent = getAgentName() || 'Front Desk';
  /* announce join the first time staff replies */
  var staffAlready = c.messages.some(function(m){ return m.from === 'hotel'; });
  if(!staffAlready){
    c.messages.push({from:'system',text:agent + ' has joined the chat.', at:timeNow(), atMs:nowMs});
  }
  c.messages.push({from:'hotel',text:text,at:timeNow(), atMs:nowMs, agentName:agent});
  /* response-time grade + toast */
  var staffIdx = c.messages.length - 1;
  var ms = computeResponseMs(c.messages, staffIdx);
  if(ms !== null){
    var grade = gradeFor(ms);
    recordGrade(grade, ms);
    if(grade.toast) showToast(grade, ms);
    renderScoreboard();
  }
  /* persist to Worker */
  if(WORKER_URL){
    fetch(WORKER_URL+'/conversation',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).catch(function(){});
  }
  input.value='';input.style.height='auto';
  renderThread(c);renderAI(c);
}

/* ============================================================
   SMART POLLING — adaptive refresh based on what the user is doing.

   THREE STATES:
     ACTIVE   — tab visible AND user moved/typed in last 60s   → poll every 5s
     BACKGROUND — tab hidden                                    → poll every 60s
     IDLE     — tab visible but no activity for 5+ minutes      → poll every 5min

   Why this matters: a 5-second refresh feels instant to staff,
   but a dashboard left open all day at that rate burns ~50,000
   requests/day (half the free Cloudflare quota per tab).

   With smart polling: ~80% reduction. Snappy when used, near-free when not.

   Counter-state changes happen the INSTANT activity is detected —
   so the moment staff touches the dashboard after being away, it
   immediately catches up.
   ============================================================ */

var POLL_ACTIVE    = 5000;     /* 5 seconds when actively used */
var POLL_BACKGROUND= 60000;    /* 60 seconds when tab is hidden */
var POLL_IDLE      = 300000;   /* 5 minutes when tab is visible but idle */
var IDLE_THRESHOLD = 60000;    /* 60s of no activity = idle */

var lastActivity = Date.now();
var pollTimer = null;

function currentPollState(){
  if(document.hidden) return {state:'background', interval:POLL_BACKGROUND};
  if(Date.now() - lastActivity > IDLE_THRESHOLD) return {state:'idle', interval:POLL_IDLE};
  return {state:'active', interval:POLL_ACTIVE};
}

function doRefresh(){
  if(currentView==='inbox'){
    loadData().then(function(){
      var list=document.getElementById('convList');
      if(!list)return;
      var savedActive=activeConvId;
      list.innerHTML='';
      /* honor the current view filter (active vs archived) */
      var showArchived = (currentView === 'archive');
      var filtered = conversations.filter(function(c){
        return showArchived ? isArchived(c) : !isArchived(c);
      });
      /* newest activity first */
      filtered.sort(function(a,b){ return lastActivityMs(b) - lastActivityMs(a); });
      if(filtered.length===0){
        list.innerHTML='<div class="dh-empty">'+
          (showArchived ? 'No archived conversations.' : 'No conversations yet.')+
          '</div>';
        return;
      }
      filtered.forEach(function(c){
        var last=c.messages[c.messages.length-1];
        var div=document.createElement('div');
        div.className='dh-conv'+(c.id===savedActive?' active':'');
        div.setAttribute('data-conv-id', c.id);
        div.onclick=function(){openConv(c.id);};
        div.innerHTML=
          '<div class="dh-conv-top"><span class="dh-conv-name">'+esc(guestDisplay(c))+'</span>'+
            '<span class="dh-conv-time">'+esc(timeDisplay(c))+'</span></div>'+
          '<div class="dh-conv-prev">Room '+esc(roomDisplay(c))+' &middot; '+esc(last?last.text:'')+'</div>'+
          '<div style="margin-top:6px">' + badgeHtml(c) + '</div>';
        list.appendChild(div);
      });
      /* if the OPEN conversation got new messages, append seamlessly */
      if(savedActive){
        var c=conversations.find(function(x){return x.id===savedActive;});
        var threadEl=document.getElementById('thread');
        if(c && threadEl){
          var renderedCount=threadEl.querySelectorAll('.dh-bub').length;
          if(c.messages.length>renderedCount){
            renderThread(c);
            renderAI(c);
          }
        }
      }
    });
  } else if(currentView==='cases' || currentView==='maint'){
    render();
  }
}

function scheduleNextPoll(){
  if(pollTimer) clearTimeout(pollTimer);
  var s = currentPollState();
  /* update the indicator badge if present */
  updatePollIndicator(s.state);
  pollTimer = setTimeout(function(){
    doRefresh();
    scheduleNextPoll();
  }, s.interval);
}

/* ---- activity detection — any input snaps us back to active mode ---- */
function bumpActivity(){
  var wasIdleOrBg = (Date.now() - lastActivity > IDLE_THRESHOLD) || document.hidden;
  lastActivity = Date.now();
  /* if we just came out of idle/background, refresh immediately */
  if(wasIdleOrBg){
    doRefresh();
    scheduleNextPoll();
  }
}
['mousemove','keydown','click','scroll','touchstart'].forEach(function(ev){
  document.addEventListener(ev, bumpActivity, {passive:true});
});

/* ---- tab visibility — refresh immediately when tab returns to foreground ---- */
document.addEventListener('visibilitychange', function(){
  if(!document.hidden){
    /* tab just became visible — refresh now and resume active polling */
    lastActivity = Date.now();
    doRefresh();
  }
  scheduleNextPoll();
});

/* ---- optional small indicator showing current poll state ---- */
function updatePollIndicator(state){
  var el = document.getElementById('pollIndicator');
  if(!el){
    el = document.createElement('div');
    el.id = 'pollIndicator';
    el.style.cssText = 'position:fixed;bottom:8px;right:10px;font-size:10px;'+
      'color:#9aa3b0;background:rgba(255,255,255,0.9);padding:3px 8px;'+
      'border-radius:10px;border:1px solid #e2e0d8;font-family:inherit;'+
      'pointer-events:none;z-index:100;letter-spacing:.04em';
    document.body.appendChild(el);
  }
  var labels = {active:'● live', background:'○ paused (tab hidden)', idle:'○ idle'};
  var colors = {active:'#2d6a4f', background:'#9aa3b0', idle:'#b7791f'};
  el.textContent = labels[state] || '';
  el.style.color = colors[state] || '#9aa3b0';
}

/* ============================================================
   DASHBOARD PASSCODE GATE — front desk console requires passcode
   12-hour browser session keeps the door open across the shift
   ============================================================ */
var DASH_SESSION_HOURS = 12;
function loadDashSession(){
  try {
    var raw = sessionStorage.getItem('qi_dash_session');
    if(!raw) return false;
    var p = JSON.parse(raw);
    if(Date.now() - p.at > DASH_SESSION_HOURS*3600*1000) return false;
    return true;
  } catch(e){ return false; }
}
function saveDashSession(){
  try { sessionStorage.setItem('qi_dash_session', JSON.stringify({at: Date.now()})); } catch(e){}
}
function clearDashSession(){
  try { sessionStorage.removeItem('qi_dash_session'); } catch(e){}
}
function showDashLock(){
  document.getElementById('dashLockScreen').style.display = 'flex';
  setTimeout(function(){ document.getElementById('dashPassInput').focus(); }, 80);
}
function hideDashLock(){
  document.getElementById('dashLockScreen').style.display = 'none';
}
function tryDashUnlock(){
  var input = document.getElementById('dashPassInput');
  var err = document.getElementById('dashLockErr');
  var pass = input.value.trim();
  if(!pass){ err.textContent = 'Enter the passcode.'; return; }
  err.textContent = '';
  fetch(WORKER_URL + '/dashboard-verify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ passcode: pass })
  }).then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok){
        saveDashSession();
        hideDashLock();
        bootApp();
      } else {
        err.textContent = 'Incorrect passcode.';
      }
    })
    .catch(function(){ err.textContent = 'Network error.'; });
}
document.getElementById('dashUnlockBtn').onclick = tryDashUnlock;
document.getElementById('dashPassInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') tryDashUnlock();
});

var STAFF_FD = [];

function refreshStaffFromSettings(){
  if(!SETTINGS_CACHE) return;
  STAFF_FD = (SETTINGS_CACHE.frontDeskStaff || []).slice();
  STAFF_MT = (SETTINGS_CACHE.maintenanceStaff || []).slice();
}

function staffOptionsHtml(team, selected){
  var roster = team === 'maintenance' ? STAFF_MT : STAFF_FD;
  var opts = '<option value="">(unassigned)</option>';
  roster.forEach(function(name){
    var sel = (name === selected) ? ' selected' : '';
    opts += '<option value="' + esc(name) + '"' + sel + '>' + esc(name) + '</option>';
  });
  return opts;
}

function fmtTimeShort(iso){
  if(!iso) return '';
  var t = Date.parse(iso);
  if(!t || isNaN(t)) return '';
  var diff = Date.now() - t;
  if(diff < 60000) return 'just now';
  var m = Math.round(diff/60000);
  if(m < 60) return m + 'm ago';
  var h = Math.round(diff/3600000);
  if(h < 24) return h + 'h ago';
  var d = Math.round(diff/86400000);
  return d + 'd ago';
}

function timelineHtml(c){
  var notes = (c.notes || []).slice().reverse();
  if(notes.length === 0){
    return '<div class="dh-case-timeline"><div style="font-size:12px;color:var(--ink-mute);padding:6px 0">No timeline yet.</div></div>';
  }
  return '<div class="dh-case-timeline">' +
    notes.map(function(n){
      var teamCls = n.team === 'maintenance' ? 'dh-case-tl-team-mt' : 'dh-case-tl-team-fd';
      var typeCls = 'dh-case-tl-type-' + (n.type || 'note');
      return '<div class="dh-case-tl-item ' + typeCls + '">' +
        '<div class="dh-case-tl-meta">' +
          '<span class="dh-case-tl-author">' + esc(n.author || 'Unknown') + '</span>' +
          '<span class="' + teamCls + '">(' + esc(n.team || 'frontDesk') + ')</span>' +
          '<span>&middot; ' + esc(fmtTimeShort(n.at)) + '</span>' +
        '</div>' +
        '<div class="dh-case-tl-text">' + esc(n.text) + '</div>' +
      '</div>';
    }).join('') +
    '</div>';
}

function expandedCasePanelHtml(c){

  var currentNote = c.currentNote || '';

    '<div class="dh-case-section">' +
      '<div class="dh-case-label">Current Status Note</div>' +
      '<div class="dh-case-current' + (currentNote ? '' : ' empty') + '" id="curNote-' + esc(c.id) + '">' +
        esc(currentNote || '(no current status — add a note below to set one)') +
      '</div>' +
    '</div>' +
    '<div class="dh-case-section">' +
      '<div class="dh-case-label">Assigned To (' + esc(owner === 'maintenance' ? 'Maintenance' : 'Front Desk') + ')</div>' +
      '<select class="dh-case-select" id="assign-' + esc(c.id) + '" onchange="changeAssign(\''+esc(c.id)+'\', this.value)">' +
        staffOptionsHtml(owner, assigned) +
      '</select>' +
    '</div>' +
    '<div class="dh-case-section">' +
      '<div class="dh-case-label">Timeline</div>' +
      timelineHtml(c) +

    '<div class="dh-case-section">' +
      '<div class="dh-case-label">Add a Note</div>' +

      '<div class="dh-case-note-row">' +

        '<button class="dh-case-note-btn" onclick="submitNote(\''+esc(c.id)+'\')">Add Note</button>' +

function changeAssign(caseId, personName){
  var c = cases.find(function(x){ return x.id === caseId; });
  if(!c) return;
  var team = c.owner || 'frontDesk';
  var who = (typeof getAgentName === 'function' ? getAgentName() : null) || 'Front Desk';
  fetch(WORKER_URL + '/case/assign', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: caseId, team: team, person: personName || null, assignedBy: who })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ alert('Could not assign: ' + d.error); return; }
      if(typeof render === 'function') render();
    });
}

function submitNote(caseId){
  var ta = document.getElementById('newNote-' + caseId);
  var cb = document.getElementById('updateCur-' + caseId);
  if(!ta) return;
  var text = ta.value.trim();
  if(!text){ ta.focus(); return; }
  var c = cases.find(function(x){ return x.id === caseId; });
  if(!c) return;
  var author = (typeof getAgentName === 'function' ? getAgentName() : null) || 'Front Desk';
  var team = c.owner || 'frontDesk';
  fetch(WORKER_URL + '/case/note', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id: caseId,
      text: text,
      author: author,
      team: team,
      type: 'note',
      updateCurrentNote: cb ? cb.checked : false
    })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ alert('Could not save note: ' + d.error); return; }
      ta.value = '';
      if(typeof render === 'function') render();
    });
}

function toggleCaseExpanded(caseId){
  EXPANDED_CASE_ID = (EXPANDED_CASE_ID === caseId) ? null : caseId;
  if(typeof render === 'function') render();
}

    if(c.currentNote){
      var cn = document.createElement('div');
      cn.className = 'dh-case-current-inline';
      cn.textContent = c.currentNote;
      injectWrap.appendChild(cn);
    }

    /* Expand button */
    var expandBtn = document.createElement('button');
    expandBtn.className = 'dh-case-expand-btn';
    expandBtn.textContent = EXPANDED_CASE_ID === id ? '▼ Hide details' : '▶ Show details, notes & assignment';
    expandBtn.onclick = function(ev){ ev.stopPropagation(); toggleCaseExpanded(id); };
    injectWrap.appendChild(expandBtn);

    /* Reassignment button row */
    if((c.status || '').toLowerCase() !== 'closed'){
      var btnWrap = document.createElement('div');
      btnWrap.style.cssText = 'margin-top:8px;display:flex;gap:8px;flex-wrap:wrap';
      if(owner === 'frontDesk'){
        var b = document.createElement('button');
        b.className = 'dh-btn';
        b.style.cssText = 'background:var(--warn-soft);color:var(--warn);border-color:var(--warn-soft);font-size:12px';
        b.innerHTML = '&#128295; Reassign to Maintenance';
        b.onclick = function(){ reassignCase(id, 'maintenance'); };
        btnWrap.appendChild(b);
      } else {
        var b2 = document.createElement('button');
        b2.className = 'dh-btn';
        b2.style.cssText = 'background:#e6edf7;color:var(--brand);border-color:#e6edf7;font-size:12px';
        b2.innerHTML = '&#8617; Pull back to Front Desk';
        b2.onclick = function(){ reassignCase(id, 'frontDesk'); };
        btnWrap.appendChild(b2);
      }
      injectWrap.appendChild(btnWrap);
    }

    /* Expanded panel */
    if(EXPANDED_CASE_ID === id){
      var panel = document.createElement('div');
      panel.innerHTML = expandedCasePanelHtml(c);
      injectWrap.appendChild(panel.firstChild);
    }

    el.appendChild(injectWrap);
  });
}
setInterval(function(){
  if(typeof currentView !== 'undefined' && currentView === 'cases'){
    injectCaseExtras();
  }
}, 600);

function copyMaintPass(){
  var v = document.getElementById('maintPassValue');
  if(!v) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(v.textContent).then(function(){
      v.style.background = '#bce5cb';
      setTimeout(function(){ v.style.background = ''; }, 800);
    });
  }
}
/* Hook injectMaintExtras after every render */
setInterval(function(){
  if(typeof currentView !== 'undefined' && currentView === 'maint'){
    injectMaintExtras();
  } else {
    var b = document.getElementById('maintPassBanner');
    if(b) b.remove();
  }
}, 600);

function bootApp(){
  loadSettings().then(function(){
    updateAgentTag();
    if(!loadAgent()){
      promptAgentName().then(function(){ render(); scheduleNextPoll(); });
    } else {
      render();
      scheduleNextPoll();
    }
  });
}
/* Passcode disabled — boot directly. To re-enable, restore decideDashAccess(). */
bootApp();
</script>
</body>
</html>
